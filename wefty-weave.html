<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Wefty Weave — mini-game mockup</title>
<style>
    :root {
        --bg-0: #0F0F23;
        --bg-1: #1A1A2E;
        --accent: #6366F1;
        --ok: #10B981;
        --warn: #F59E0B;
        --bad: #EF4444;
        --muted: #A0A0B8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
        min-height: 100vh;
        padding: 20px 16px 40px;
        overflow-x: hidden;
    }

    /* Two-column on wide screens: Wefty on the left, game on the right.
       Stacks vertically on narrow / mobile widths. */
    .layout {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 32px;
        max-width: 1000px;
        margin: 0 auto;
    }
    .side {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }
    .wefty-avatar {
        position: relative;
        width: 240px;
        height: 240px;
        animation: wefty-bob 2.4s ease-in-out infinite;
    }
    .wefty-avatar img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
    }
    .wefty-avatar .wefty-blink {
        opacity: 0;
        animation: wefty-weave-blink 4.8s steps(1, end) infinite;
    }
    @keyframes wefty-weave-blink {
        /* Eyes closed for a ~120ms flash once per cycle. */
        0%, 95%  { opacity: 0; }
        96%, 98% { opacity: 1; }
        100%     { opacity: 0; }
    }
    .bubble {
        background: #1E1E36;
        padding: 12px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
        font-size: 13px;
        max-width: 220px;
        text-align: center;
        position: relative;
    }
    .bubble::after {
        content: "";
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        width: 12px;
        height: 12px;
        background: #1E1E36;
        border-top: 1px solid rgba(255,255,255,0.08);
        border-left: 1px solid rgba(255,255,255,0.08);
    }
    @keyframes wefty-bob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
    }

    .col {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h1 { margin: 8px 0 0; font-size: 22px; }
    .sub { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .hud {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
    }
    .hud .pill {
        background: #1E1E36;
        border: 1px solid rgba(255,255,255,0.08);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
    }
    .hud .pill strong { color: #fff; }
    .wchar {
        display: inline-block;
        padding: 0 2px;
        opacity: 0.45;
        transition: opacity 200ms, transform 200ms;
    }
    .wchar.done { opacity: 0.7; color: var(--ok); }
    .wchar.active { opacity: 1; color: #fff; transform: scale(1.15); }

    .stage {
        position: relative;
        width: min(520px, 96vw);
        aspect-ratio: 1 / 1;
        background: #1E1E36;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
        touch-action: none;
    }
    .stage svg, .stage canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }

    @media (max-width: 720px) {
        .layout {
            flex-direction: column;
            gap: 12px;
        }
        .wefty-avatar { width: 140px; height: 140px; }
        .side { flex-direction: row; }
        .bubble::after { top: 50%; left: -6px; transform: translateY(-50%) rotate(45deg); }
    }

    .hint {
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        min-height: 18px;
    }

    .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
        justify-content: center;
    }
    button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }
    button.ghost {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.15);
        color: var(--muted);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        padding: 10px 16px;
        border-radius: 10px;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: opacity 200ms, transform 200ms;
        pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok  { background: var(--ok); }
    .toast.bad { background: var(--bad); }
</style>
</head>
<body>

<div class="layout">
    <div class="side">
        <div class="wefty-avatar">
            <img src="wefty.png" alt="Wefty">
            <img src="wefty_blink.png" alt="" class="wefty-blink">
        </div>
        <div class="bubble">Finish weaving my letters! Trace the missing threads.</div>
    </div>

    <div class="col">
        <div class="hud">
            <div class="pill">Letter <strong id="hud-letter">—</strong></div>
            <div class="pill">Score <strong id="hud-score">0</strong></div>
            <div class="pill"><strong id="hud-progress">0</strong>/<span id="hud-total">5</span></div>
        </div>

        <div class="stage" id="stage">
            <!-- Layered canvases:
                 - #bg renders the target letter: the "already-woven" static
                   strokes plus a faint guide for the missing stroke. Rendered
                   once per letter.
                 - #ink captures the player's drawing. -->
            <canvas id="bg"></canvas>
            <canvas id="ink"></canvas>
        </div>

        <div class="hint" id="hint">Draw the missing thread in one stroke</div>

        <div class="btn-row">
            <button id="btn-clear" class="ghost">Erase</button>
            <button id="btn-skip" class="ghost">Skip</button>
            <button id="btn-check">Check</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
    // ── Letter definitions ─────────────────────────────────────────────
    // strokes: pre-woven pieces shown to the player. Each is either a
    //   straight polyline ([[x,y], …]) or a quadratic bezier
    //   ({ curve: [p0, ctrl, p1] }).
    // targets: one or more polylines the player must DRAW. Each target is
    //   a [[x,y],[x,y]] segment; multi-segment letters like E list
    //   multiple targets.
    // Coordinates live in a 400×400 virtual space.
    const LETTERS = {
        A: {
            strokes: [
                [[80, 340], [200, 60]],
                [[200, 60], [320, 340]],
            ],
            targets: [[[135, 220], [265, 220]]],
        },
        B: {
            strokes: [
                [[80, 60], [80, 340]],
                { curve: [[80, 60], [290, 60], [250, 200]] },
                { curve: [[250, 200], [120, 200], [80, 200]] },
                { curve: [[80, 200], [300, 200], [260, 340]] },
                { curve: [[260, 340], [120, 340], [80, 340]] },
            ],
            // B already has a middle band where the bowls meet. Missing
            // piece: the short horizontal at the spine crook — teaches the
            // player to trace the join line.
            targets: [[[80, 200], [180, 200]]],
        },
        E: {
            strokes: [
                [[80, 60], [80, 340]],
            ],
            targets: [
                [[80, 60], [300, 60]],   // top bar
                [[80, 200], [270, 200]], // middle bar
                [[80, 340], [300, 340]], // bottom bar
            ],
        },
        F: {
            strokes: [
                [[80, 60], [80, 340]],
            ],
            targets: [
                [[80, 60], [300, 60]],
                [[80, 200], [260, 200]],
            ],
        },
        H: {
            strokes: [
                [[80, 60], [80, 340]],
                [[320, 60], [320, 340]],
            ],
            targets: [[[80, 200], [320, 200]]],
        },
        I: {
            strokes: [
                [[200, 80], [200, 320]], // stem
            ],
            targets: [
                [[120, 80], [280, 80]],   // top serif
                [[120, 320], [280, 320]], // bottom serif
            ],
        },
        L: {
            strokes: [
                [[80, 60], [80, 340]],
            ],
            targets: [[[80, 340], [300, 340]]],
        },
        T: {
            strokes: [
                [[200, 80], [200, 340]],
            ],
            targets: [[[80, 80], [320, 80]]],
        },
        Z: {
            strokes: [
                [[100, 340], [300, 60]],
            ],
            targets: [
                [[80, 60], [320, 60]],
                [[80, 340], [320, 340]],
            ],
        },
    };

    // Short practice words. Each letter appears in LETTERS above.
    const WORDS = ['HAT', 'FEET', 'TALE', 'BELT'];

    // Flat level queue: for each word, its letters become consecutive
    // stages. The HUD shows the current word + position inside it.
    const LEVELS = [];
    WORDS.forEach((word, wi) => {
        word.split('').forEach((ch, li) => {
            LEVELS.push({ word, wordIdx: wi, letterInWord: li, letter: ch });
        });
    });
    const TOTAL = LEVELS.length;
    document.getElementById('hud-total').textContent = TOTAL;

    // Per-letter thread palettes. Each palette is three strands (main,
    // highlight, shadow) so the stroke looks like braided yarn instead of
    // a flat line. Cycled per letter to match the logo's multi-color vibe.
    const THREAD_PALETTES = [
        { main: '#EC4899', light: '#F9A8D4', dark: '#9D174D' },
        { main: '#10B981', light: '#6EE7B7', dark: '#065F46' },
        { main: '#F59E0B', light: '#FCD34D', dark: '#92400E' },
        { main: '#6366F1', light: '#A5B4FC', dark: '#3730A3' },
        { main: '#06B6D4', light: '#67E8F9', dark: '#155E75' },
    ];

    // ── Canvas setup ───────────────────────────────────────────────────
    const stage = document.getElementById('stage');
    const bg = document.getElementById('bg');
    const ink = document.getElementById('ink');
    const bgCtx = bg.getContext('2d');
    const inkCtx = ink.getContext('2d');

    function fitCanvases() {
        const rect = stage.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        for (const c of [bg, ink]) {
            c.width = Math.round(rect.width * dpr);
            c.height = Math.round(rect.height * dpr);
            c.style.width = rect.width + 'px';
            c.style.height = rect.height + 'px';
            c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
        }
    }
    window.addEventListener('resize', () => { fitCanvases(); renderBackground(); redrawInk(); });
    fitCanvases();

    // Virtual space → pixel space
    function toPx(pt) {
        const rect = stage.getBoundingClientRect();
        return [pt[0] / 400 * rect.width, pt[1] / 400 * rect.height];
    }

    // ── State ──────────────────────────────────────────────────────────
    let levelIdx = 0;
    let score = 0;
    let drawing = false;
    let inkStrokes = [];      // array of strokes (each stroke = array of pts)
    let currentStroke = null; // the stroke in progress

    // Optional yarn texture overlay. Drop a tileable PNG at /yarn_texture.png
    // and it renders as a multiplied pattern on top of every thread.
    let yarnPattern = null;
    (() => {
        const img = new Image();
        img.onload = () => {
            yarnPattern = bgCtx.createPattern(img, 'repeat');
            renderBackground();
            redrawInk();
        };
        img.onerror = () => { /* texture is optional — ignore */ };
        img.src = 'yarn_texture.png';
    })();

    // ── Rendering ──────────────────────────────────────────────────────
    // A "thread" is drawn in multiple passes so it feels like braided yarn:
    //   1. Soft drop shadow underneath (halo)
    //   2. Dark outline for depth
    //   3. Main fill color
    //   4. Optional yarn texture overlay (multiplied on top of main color)
    //   5. Highlight band offset up-left for a rounded cord look
    //   6. Thin dashed overlay (perpendicular stitches) for visible fibers
    // Supports straight polylines AND quadratic curves; curves are sampled
    // into polylines so scoring + highlight geometry just works.
    function pathPoints(stroke) {
        if (Array.isArray(stroke)) return stroke.map(toPx);
        if (stroke && stroke.curve) {
            const [p0, c, p1] = stroke.curve;
            const out = [];
            const steps = 32;
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const x = (1 - t) * (1 - t) * p0[0] + 2 * (1 - t) * t * c[0] + t * t * p1[0];
                const y = (1 - t) * (1 - t) * p0[1] + 2 * (1 - t) * t * c[1] + t * t * p1[1];
                out.push(toPx([x, y]));
            }
            return out;
        }
        return [];
    }

    function drawThread(ctx, pts, palette, baseWidth) {
        if (pts.length < 2) return;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.45)';
        ctx.shadowBlur = baseWidth * 0.5;
        ctx.strokeStyle = palette.dark;
        ctx.lineWidth = baseWidth * 1.15;
        strokePath(ctx, pts);
        ctx.restore();
        ctx.strokeStyle = palette.dark;
        ctx.lineWidth = baseWidth * 1.08;
        strokePath(ctx, pts);
        ctx.strokeStyle = palette.main;
        ctx.lineWidth = baseWidth * 0.9;
        strokePath(ctx, pts);
        // Yarn texture (if loaded) — multiplies over main color so tint survives.
        if (yarnPattern) {
            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            ctx.globalAlpha = 0.75;
            ctx.strokeStyle = yarnPattern;
            ctx.lineWidth = baseWidth * 0.9;
            strokePath(ctx, pts);
            ctx.restore();
        }
        ctx.save();
        ctx.translate(-baseWidth * 0.12, -baseWidth * 0.18);
        ctx.strokeStyle = palette.light;
        ctx.lineWidth = baseWidth * 0.35;
        ctx.globalAlpha = 0.85;
        strokePath(ctx, pts);
        ctx.restore();
        ctx.save();
        ctx.setLineDash([baseWidth * 0.22, baseWidth * 0.55]);
        ctx.strokeStyle = palette.dark;
        ctx.lineWidth = baseWidth * 0.95;
        ctx.globalAlpha = 0.35;
        strokePath(ctx, pts);
        ctx.restore();
    }
    function strokePath(ctx, pts) {
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.stroke();
    }

    function renderBackground() {
        const rect = stage.getBoundingClientRect();
        bgCtx.clearRect(0, 0, rect.width, rect.height);

        const level = LEVELS[levelIdx];
        const letter = LETTERS[level.letter];
        if (!letter) return;
        const palette = THREAD_PALETTES[level.wordIdx % THREAD_PALETTES.length];
        const w = rect.width * 0.055;

        for (const s of letter.strokes) drawThread(bgCtx, pathPoints(s), palette, w);

        // Missing-thread guides: faint braided ghost + dashed centerline
        // for every target the player still needs to draw.
        const guidePalette = {
            main: 'rgba(255,255,255,0.10)',
            light: 'rgba(255,255,255,0.18)',
            dark: 'rgba(255,255,255,0.05)',
        };
        for (const t of letter.targets) {
            bgCtx.save();
            bgCtx.globalAlpha = 0.9;
            drawThread(bgCtx, t.map(toPx), guidePalette, w * 0.85);
            bgCtx.restore();
            bgCtx.save();
            bgCtx.setLineDash([8, 10]);
            bgCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            bgCtx.lineWidth = 2;
            strokePath(bgCtx, t.map(toPx));
            bgCtx.restore();
        }
    }

    function redrawInk() {
        const rect = stage.getBoundingClientRect();
        inkCtx.clearRect(0, 0, rect.width, rect.height);
        const level = LEVELS[levelIdx];
        if (!level) return;
        const palette = THREAD_PALETTES[level.wordIdx % THREAD_PALETTES.length];
        const w = rect.width * 0.055;
        for (const s of inkStrokes) if (s.length >= 2) drawThread(inkCtx, s, palette, w);
        if (currentStroke && currentStroke.length >= 2) drawThread(inkCtx, currentStroke, palette, w);
    }

    // ── Input ──────────────────────────────────────────────────────────
    function eventPos(e) {
        const rect = stage.getBoundingClientRect();
        const src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
        return [src.clientX - rect.left, src.clientY - rect.top];
    }
    function startDraw(e) {
        e.preventDefault();
        drawing = true;
        currentStroke = [eventPos(e)];
        redrawInk();
    }
    function moveDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = eventPos(e);
        const last = currentStroke[currentStroke.length - 1];
        if (Math.hypot(p[0] - last[0], p[1] - last[1]) >= 2) {
            currentStroke.push(p);
            redrawInk();
        }
    }
    function endDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        drawing = false;
        if (currentStroke && currentStroke.length >= 2) inkStrokes.push(currentStroke);
        currentStroke = null;
    }
    stage.addEventListener('mousedown', startDraw);
    stage.addEventListener('mousemove', moveDraw);
    window.addEventListener('mouseup', endDraw);
    stage.addEventListener('touchstart', startDraw, { passive: false });
    stage.addEventListener('touchmove', moveDraw, { passive: false });
    stage.addEventListener('touchend', endDraw, { passive: false });
    stage.addEventListener('touchcancel', endDraw, { passive: false });

    // ── Scoring ────────────────────────────────────────────────────────
    // For each target segment, pick the ink stroke that best matches it and
    // score endpoint + coverage. All targets must pass for the level to
    // clear; returned accuracy is the average across targets.
    function scoreSingleTarget(targetPx, ink, tol) {
        if (!ink || ink.length < 3) return { ok: false, accuracy: 0 };
        const a0 = dist(ink[0], targetPx[0]);
        const a1 = dist(ink[ink.length - 1], targetPx[1]);
        const b0 = dist(ink[0], targetPx[1]);
        const b1 = dist(ink[ink.length - 1], targetPx[0]);
        const endpointsOk = (a0 < tol * 2 && a1 < tol * 2) || (b0 < tol * 2 && b1 < tol * 2);
        const SAMPLES = 24;
        let covered = 0;
        for (let i = 0; i <= SAMPLES; i++) {
            const t = i / SAMPLES;
            const tx = targetPx[0][0] + (targetPx[1][0] - targetPx[0][0]) * t;
            const ty = targetPx[0][1] + (targetPx[1][1] - targetPx[0][1]) * t;
            let best = Infinity;
            for (const p of ink) {
                const d = Math.hypot(p[0] - tx, p[1] - ty);
                if (d < best) best = d;
            }
            if (best < tol) covered++;
        }
        const accuracy = covered / (SAMPLES + 1);
        return { ok: endpointsOk && accuracy >= 0.72, accuracy, endpointsOk };
    }
    function scoreLevel() {
        const level = LEVELS[levelIdx];
        const letter = LETTERS[level.letter];
        const rect = stage.getBoundingClientRect();
        const tol = rect.width * 0.07;
        if (inkStrokes.length === 0) return { ok: false, accuracy: 0, reason: 'Draw the missing thread' };
        let passing = 0;
        let accSum = 0;
        let anyEndpointMiss = false;
        for (const t of letter.targets) {
            const targetPx = t.map(toPx);
            let best = { ok: false, accuracy: 0, endpointsOk: false };
            for (const ink of inkStrokes) {
                const r = scoreSingleTarget(targetPx, ink, tol);
                if (r.accuracy > best.accuracy) best = r;
            }
            if (best.ok) passing++;
            if (!best.endpointsOk) anyEndpointMiss = true;
            accSum += best.accuracy;
        }
        const accuracy = accSum / letter.targets.length;
        if (passing < letter.targets.length) {
            const missing = letter.targets.length - passing;
            const reason = anyEndpointMiss
                ? 'Start and end on each dashed line'
                : `Missed ${missing} ${missing === 1 ? 'thread' : 'threads'} — trace closer`;
            return { ok: false, accuracy, reason };
        }
        return { ok: true, accuracy };
    }
    function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }

    // ── Flow ───────────────────────────────────────────────────────────
    function loadLevel(i) {
        levelIdx = i;
        inkStrokes = [];
        currentStroke = null;
        redrawInk();
        renderBackground();
        const level = LEVELS[i];
        // HUD shows the word with the current letter highlighted.
        const letterCell = document.getElementById('hud-letter');
        letterCell.innerHTML = level.word
            .split('')
            .map((ch, idx) => {
                const cls = idx === level.letterInWord ? 'active' : (idx < level.letterInWord ? 'done' : '');
                return `<span class="wchar ${cls}">${ch}</span>`;
            })
            .join('');
        document.getElementById('hud-progress').textContent = i;
        const targetCount = LETTERS[level.letter].targets.length;
        document.getElementById('hint').textContent = targetCount === 1
            ? 'Draw the missing thread'
            : `Draw all ${targetCount} missing threads`;
    }

    function check() {
        const r = scoreLevel();
        if (r.ok) {
            const gain = Math.round(50 + 50 * r.accuracy);
            score += gain;
            document.getElementById('hud-score').textContent = score;
            toast(`Nice weave! +${gain}`, 'ok');
            setTimeout(() => {
                const nxt = levelIdx + 1;
                if (nxt >= TOTAL) {
                    document.getElementById('hint').textContent = `Done! Final score: ${score}`;
                    document.getElementById('btn-check').disabled = true;
                    document.getElementById('hud-progress').textContent = TOTAL;
                } else {
                    loadLevel(nxt);
                }
            }, 700);
        } else {
            toast(r.reason || 'Not quite — try again', 'bad');
        }
    }
    function toast(msg, kind) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show ' + (kind || '');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => el.classList.remove('show'), 1600);
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        inkStrokes = [];
        currentStroke = null;
        redrawInk();
    });
    document.getElementById('btn-skip').addEventListener('click', () => {
        const nxt = levelIdx + 1;
        if (nxt < TOTAL) loadLevel(nxt);
    });
    document.getElementById('btn-check').addEventListener('click', check);

    loadLevel(0);
})();
</script>
</body>
</html>
