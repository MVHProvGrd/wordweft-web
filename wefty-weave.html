<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Wefty Weave — mini-game mockup</title>
<style>
    :root {
        --bg-0: #0F0F23;
        --bg-1: #1A1A2E;
        --accent: #6366F1;
        --ok: #10B981;
        --warn: #F59E0B;
        --bad: #EF4444;
        --muted: #A0A0B8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
        min-height: 100vh;
        padding: 20px 16px 40px;
        overflow-x: hidden;
    }

    /* Two-column on wide screens: Wefty on the left, game on the right.
       Stacks vertically on narrow / mobile widths. */
    .layout {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 32px;
        max-width: 1000px;
        margin: 0 auto;
    }
    .side {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }
    .wefty-avatar {
        position: relative;
        width: 240px;
        height: 240px;
        animation: wefty-bob 2.4s ease-in-out infinite;
    }
    .wefty-avatar img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
    }
    .wefty-avatar .wefty-blink {
        opacity: 0;
        animation: wefty-weave-blink 4.8s steps(1, end) infinite;
    }
    @keyframes wefty-weave-blink {
        /* Eyes closed for a ~120ms flash once per cycle. */
        0%, 95%  { opacity: 0; }
        96%, 98% { opacity: 1; }
        100%     { opacity: 0; }
    }
    .bubble {
        background: #1E1E36;
        padding: 12px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.08);
        font-size: 13px;
        max-width: 220px;
        text-align: center;
        position: relative;
    }
    .bubble::after {
        content: "";
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        width: 12px;
        height: 12px;
        background: #1E1E36;
        border-top: 1px solid rgba(255,255,255,0.08);
        border-left: 1px solid rgba(255,255,255,0.08);
    }
    @keyframes wefty-bob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
    }

    .col {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h1 { margin: 8px 0 0; font-size: 22px; }
    .sub { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .hud {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
    }
    .hud .pill {
        background: #1E1E36;
        border: 1px solid rgba(255,255,255,0.08);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
    }
    .hud .pill strong { color: #fff; }
    .wchar {
        display: inline-block;
        padding: 0 2px;
        opacity: 0.45;
        transition: opacity 200ms, transform 200ms;
    }
    .wchar.done { opacity: 0.7; color: var(--ok); }
    .wchar.active { opacity: 1; color: #fff; transform: scale(1.15); }

    .stage {
        position: relative;
        width: min(720px, 96vw);
        aspect-ratio: var(--stage-aspect, 2 / 1);
        background: #1E1E36;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
        touch-action: none;
    }
    .stage svg, .stage canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }

    @media (max-width: 720px) {
        .layout {
            flex-direction: column;
            gap: 12px;
        }
        .wefty-avatar { width: 140px; height: 140px; }
        .side { flex-direction: row; }
        .bubble::after { top: 50%; left: -6px; transform: translateY(-50%) rotate(45deg); }
    }

    .hint {
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        min-height: 18px;
    }

    .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
        justify-content: center;
    }
    button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }
    button.ghost {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.15);
        color: var(--muted);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        padding: 10px 16px;
        border-radius: 10px;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        opacity: 0;
        transition: opacity 200ms, transform 200ms;
        pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok  { background: var(--ok); }
    .toast.bad { background: var(--bad); }
</style>
</head>
<body>

<div class="layout">
    <div class="side">
        <div class="wefty-avatar">
            <img src="wefty.png" alt="Wefty">
            <img src="wefty_blink.png" alt="" class="wefty-blink">
        </div>
        <div class="bubble">Finish weaving my letters! Trace the missing threads.</div>
    </div>

    <div class="col">
        <div class="hud">
            <div class="pill">Letter <strong id="hud-letter">—</strong></div>
            <div class="pill">Score <strong id="hud-score">0</strong></div>
            <div class="pill"><strong id="hud-progress">0</strong>/<span id="hud-total">5</span></div>
        </div>

        <div class="stage" id="stage">
            <!-- Layered canvases:
                 - #bg renders the target letter: the "already-woven" static
                   strokes plus a faint guide for the missing stroke. Rendered
                   once per letter.
                 - #ink captures the player's drawing. -->
            <canvas id="bg"></canvas>
            <canvas id="ink"></canvas>
        </div>

        <div class="hint" id="hint">Draw the missing thread in one stroke</div>

        <div class="btn-row">
            <button id="btn-clear" class="ghost">Undo</button>
            <button id="btn-skip" class="ghost">Skip word</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="wefty-thread.js"></script>
<script>
(() => {
    // ── Letter definitions ─────────────────────────────────────────────
    // Each letter defines:
    //   strokes: pre-woven pieces shown to the player
    //   targets: pieces the PLAYER must draw
    // Each piece is either a straight polyline [[x,y],[x,y],...] or a
    //   quadratic bezier curve { curve: [p0, ctrl, p1] }.
    // Letters are authored in a 200×400 local box; the word layout stamps
    //   them side-by-side with horizontal offsets.
    const LETTERS = {
        A: {
            strokes: [
                [[40, 340], [100, 60]],
                [[100, 60], [160, 340]],
            ],
            targets: [[[67, 220], [133, 220]]],
        },
        B: {
            // Spine pre-drawn; player draws both half-circle bowls.
            strokes: [[[40, 60], [40, 340]]],
            targets: [
                { curve: [[40, 60], [180, 110], [40, 200]] },
                { curve: [[40, 200], [190, 250], [40, 340]] },
            ],
        },
        D: {
            strokes: [[[40, 60], [40, 340]]],
            targets: [
                { curve: [[40, 60], [200, 200], [40, 340]] },
            ],
        },
        E: {
            strokes: [[[40, 60], [40, 340]]],
            targets: [
                [[40, 60], [160, 60]],
                [[40, 200], [140, 200]],
                [[40, 340], [160, 340]],
            ],
        },
        F: {
            strokes: [[[40, 60], [40, 340]]],
            targets: [
                [[40, 60], [160, 60]],
                [[40, 200], [140, 200]],
            ],
        },
        H: {
            strokes: [
                [[40, 60], [40, 340]],
                [[160, 60], [160, 340]],
            ],
            targets: [[[40, 200], [160, 200]]],
        },
        I: {
            strokes: [[[100, 80], [100, 320]]],
            targets: [
                [[60, 80], [140, 80]],
                [[60, 320], [140, 320]],
            ],
        },
        L: {
            strokes: [[[40, 60], [40, 340]]],
            targets: [[[40, 340], [160, 340]]],
        },
        P: {
            strokes: [[[40, 60], [40, 340]]],
            targets: [
                { curve: [[40, 60], [180, 110], [40, 200]] },
            ],
        },
        T: {
            strokes: [[[100, 80], [100, 340]]],
            targets: [[[30, 80], [170, 80]]],
        },
        Z: {
            strokes: [[[50, 340], [150, 60]]],
            targets: [
                [[40, 60], [160, 60]],
                [[40, 340], [160, 340]],
            ],
        },
    };

    // Practice words — each letter must exist in LETTERS above.
    const WORDS = ['HAT', 'BET', 'FEET', 'BELT', 'LATE', 'HELP', 'FAITH'];
    const TOTAL = WORDS.length;
    document.getElementById('hud-total').textContent = TOTAL;

    // Layout: each letter slot is 200 wide × 400 tall, separated by GAP.
    const LETTER_W = 200;
    const LETTER_H = 400;
    const GAP = 40;
    const MARGIN = 40;
    function slotOffset(i) { return MARGIN + i * (LETTER_W + GAP); }
    function wordVirtualWidth(word) {
        return 2 * MARGIN + word.length * LETTER_W + (word.length - 1) * GAP;
    }

    // Thread palettes + rendering come from wefty-thread.js so Wefty Run
    // can reuse the same yarn look without drift.
    const THREAD_PALETTES = WeftyThread.PALETTES;

    // ── Canvas setup ───────────────────────────────────────────────────
    const stage = document.getElementById('stage');
    const bg = document.getElementById('bg');
    const ink = document.getElementById('ink');
    const bgCtx = bg.getContext('2d');
    const inkCtx = ink.getContext('2d');

    function fitCanvases() {
        const rect = stage.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        for (const c of [bg, ink]) {
            c.width = Math.round(rect.width * dpr);
            c.height = Math.round(rect.height * dpr);
            c.style.width = rect.width + 'px';
            c.style.height = rect.height + 'px';
            c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
        }
    }
    window.addEventListener('resize', () => { fitCanvases(); renderBackground(); redrawInk(); });
    fitCanvases();

    // Virtual space → pixel space. Word-aware: virtual width depends on
    // the current word's letter count.
    function toPx(pt) {
        const rect = stage.getBoundingClientRect();
        const vw = currentVirtualWidth();
        return [pt[0] / vw * rect.width, pt[1] / LETTER_H * rect.height];
    }
    function pxToVirtual(px) {
        const rect = stage.getBoundingClientRect();
        const vw = currentVirtualWidth();
        return [px[0] / rect.width * vw, px[1] / rect.height * LETTER_H];
    }
    // Offset a stroke definition horizontally (for positioning each letter
    // in the word row). Works for polylines and curves.
    function shiftStroke(stroke, dx) {
        if (Array.isArray(stroke)) return stroke.map(p => [p[0] + dx, p[1]]);
        if (stroke && stroke.curve) {
            return { curve: stroke.curve.map(p => [p[0] + dx, p[1]]) };
        }
        return stroke;
    }

    // ── State ──────────────────────────────────────────────────────────
    let levelIdx = 0;
    let score = 0;
    let drawing = false;
    let inkStrokes = [];      // array of strokes (each stroke = array of pts)
    let currentStroke = null; // stroke in progress
    let levelLocked = false;  // true after success, before next word loads

    // Optional yarn texture overlay. Drop a tileable PNG at /yarn_texture.png
    // and it renders as a multiplied pattern on top of every thread.
    let yarnPattern = null;
    WeftyThread.loadYarnPattern(bgCtx, 'yarn_texture.png', (p) => {
        yarnPattern = p;
        renderBackground();
        redrawInk();
    });

    function currentWord() { return WORDS[levelIdx]; }
    function currentVirtualWidth() { return wordVirtualWidth(currentWord()); }
    function setStageAspect() {
        const vw = currentVirtualWidth();
        stage.style.setProperty('--stage-aspect', `${vw} / ${LETTER_H}`);
        fitCanvases();
    }

    // ── Rendering ──────────────────────────────────────────────────────
    // A "thread" is drawn in multiple passes so it feels like braided yarn:
    //   1. Soft drop shadow underneath (halo)
    //   2. Dark outline for depth
    //   3. Main fill color
    //   4. Optional yarn texture overlay (multiplied on top of main color)
    //   5. Highlight band offset up-left for a rounded cord look
    //   6. Thin dashed overlay (perpendicular stitches) for visible fibers
    // Supports straight polylines AND quadratic curves; curves are sampled
    // into polylines so scoring + highlight geometry just works.
    function pathPoints(stroke) {
        if (Array.isArray(stroke)) return stroke.map(toPx);
        if (stroke && stroke.curve) {
            const [p0, c, p1] = stroke.curve;
            const out = [];
            const steps = 32;
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const x = (1 - t) * (1 - t) * p0[0] + 2 * (1 - t) * t * c[0] + t * t * p1[0];
                const y = (1 - t) * (1 - t) * p0[1] + 2 * (1 - t) * t * c[1] + t * t * p1[1];
                out.push(toPx([x, y]));
            }
            return out;
        }
        return [];
    }

    // drawThread + strokePath live in wefty-thread.js (WeftyThread module).
    // Local wrapper binds the current yarnPattern so the call sites can
    // stay concise.
    function drawThread(ctx, pts, palette, baseWidth) {
        WeftyThread.drawThread(ctx, pts, palette, baseWidth, yarnPattern);
    }

    // Thread width scaled off the LETTER HEIGHT (constant across word
    // lengths) so threads don't shrink for longer words.
    function threadWidth() {
        const rect = stage.getBoundingClientRect();
        return rect.height * 0.075;
    }

    // All pre-drawn strokes for the current word, with letter offsets applied.
    function currentStrokes() {
        const word = currentWord();
        const out = [];
        for (let i = 0; i < word.length; i++) {
            const letter = LETTERS[word[i]];
            if (!letter) continue;
            const dx = slotOffset(i);
            for (const s of letter.strokes) out.push(shiftStroke(s, dx));
        }
        return out;
    }
    // All targets for the current word, with offsets + their letter/target idx.
    function currentTargets() {
        const word = currentWord();
        const out = [];
        for (let i = 0; i < word.length; i++) {
            const letter = LETTERS[word[i]];
            if (!letter) continue;
            const dx = slotOffset(i);
            for (let ti = 0; ti < letter.targets.length; ti++) {
                out.push({
                    idx: out.length,
                    letterIdx: i,
                    letter: word[i],
                    stroke: shiftStroke(letter.targets[ti], dx),
                });
            }
        }
        return out;
    }

    function renderBackground() {
        const rect = stage.getBoundingClientRect();
        bgCtx.clearRect(0, 0, rect.width, rect.height);

        const w = threadWidth();
        const wordIdx = levelIdx % THREAD_PALETTES.length;
        const palette = THREAD_PALETTES[wordIdx];

        // Pre-woven strokes
        for (const s of currentStrokes()) drawThread(bgCtx, pathPoints(s), palette, w);

        // Faint guide for every target
        const guidePalette = {
            main: 'rgba(255,255,255,0.10)',
            light: 'rgba(255,255,255,0.18)',
            dark: 'rgba(255,255,255,0.05)',
        };
        for (const t of currentTargets()) {
            const pts = pathPoints(t.stroke);
            bgCtx.save();
            bgCtx.globalAlpha = 0.9;
            drawThread(bgCtx, pts, guidePalette, w * 0.85);
            bgCtx.restore();
            bgCtx.save();
            bgCtx.setLineDash([8, 10]);
            bgCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            bgCtx.lineWidth = 2;
            strokePath(bgCtx, pts);
            bgCtx.restore();
        }
    }

    function redrawInk() {
        const rect = stage.getBoundingClientRect();
        inkCtx.clearRect(0, 0, rect.width, rect.height);
        const palette = THREAD_PALETTES[levelIdx % THREAD_PALETTES.length];
        const w = threadWidth();
        for (const s of inkStrokes) if (s.length >= 2) drawThread(inkCtx, s, palette, w);
        if (currentStroke && currentStroke.length >= 2) drawThread(inkCtx, currentStroke, palette, w);
    }

    // ── Input ──────────────────────────────────────────────────────────
    function eventPos(e) {
        const rect = stage.getBoundingClientRect();
        const src = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
        return [src.clientX - rect.left, src.clientY - rect.top];
    }
    function startDraw(e) {
        if (levelLocked) return;
        e.preventDefault();
        drawing = true;
        currentStroke = [eventPos(e)];
        redrawInk();
    }
    function moveDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = eventPos(e);
        const last = currentStroke[currentStroke.length - 1];
        if (Math.hypot(p[0] - last[0], p[1] - last[1]) >= 2) {
            currentStroke.push(p);
            redrawInk();
        }
    }
    function endDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        drawing = false;
        if (currentStroke && currentStroke.length >= 2) inkStrokes.push(currentStroke);
        currentStroke = null;
        // Auto-check: once every target is covered, advance.
        const r = scoreLevel();
        updateLivePassing(r);
        if (r.ok) onLevelPassed(r);
    }
    function updateLivePassing(r) {
        const el = document.getElementById('hint');
        if (r.passing === r.total) el.textContent = `All ${r.total} threads woven — nice!`;
        else el.textContent = `${r.passing}/${r.total} threads woven`;
    }
    stage.addEventListener('mousedown', startDraw);
    stage.addEventListener('mousemove', moveDraw);
    window.addEventListener('mouseup', endDraw);
    stage.addEventListener('touchstart', startDraw, { passive: false });
    stage.addEventListener('touchmove', moveDraw, { passive: false });
    stage.addEventListener('touchend', endDraw, { passive: false });
    stage.addEventListener('touchcancel', endDraw, { passive: false });

    // ── Scoring ────────────────────────────────────────────────────────
    // Each target is pre-sampled into pixel-space points. Score picks the
    // ink stroke whose path best matches the target, using:
    //   - coverage: fraction of target samples within tol of some ink point
    //   - endpoint proximity: both target endpoints need a nearby ink point
    //     (direction-agnostic — player can draw either way)
    // Pass gate is 0.88 coverage, which is stricter than the previous 0.72.
    function scoreOneTarget(targetPts, ink, tol) {
        if (!ink || ink.length < 3) return { ok: false, accuracy: 0, endpointsOk: false };
        const start = targetPts[0], end = targetPts[targetPts.length - 1];
        let dStart = Infinity, dEnd = Infinity;
        for (const p of ink) {
            const ds = Math.hypot(p[0] - start[0], p[1] - start[1]);
            const de = Math.hypot(p[0] - end[0],   p[1] - end[1]);
            if (ds < dStart) dStart = ds;
            if (de < dEnd)   dEnd = de;
        }
        const endpointsOk = dStart < tol * 1.6 && dEnd < tol * 1.6;

        let covered = 0;
        for (const t of targetPts) {
            let best = Infinity;
            for (const p of ink) {
                const d = Math.hypot(p[0] - t[0], p[1] - t[1]);
                if (d < best) best = d;
            }
            if (best < tol) covered++;
        }
        const accuracy = covered / targetPts.length;
        return { ok: endpointsOk && accuracy >= 0.88, accuracy, endpointsOk };
    }
    function scoreLevel() {
        const targets = currentTargets();
        if (inkStrokes.length === 0) return { ok: false, accuracy: 0, passing: 0, total: targets.length };
        const rect = stage.getBoundingClientRect();
        const tol = rect.height * 0.055;

        // Pre-sample target paths to pixel polylines
        const samples = targets.map(t => pathPoints(t.stroke));

        // Assign each target its best-matching ink stroke (allowing reuse;
        // player may reuse the same stroke for multiple nearby targets in
        // practice that doesn't really happen, but allow it).
        let passing = 0, accSum = 0;
        for (const pts of samples) {
            let best = { ok: false, accuracy: 0, endpointsOk: false };
            for (const ink of inkStrokes) {
                const r = scoreOneTarget(pts, ink, tol);
                if (r.accuracy > best.accuracy) best = r;
            }
            if (best.ok) passing++;
            accSum += best.accuracy;
        }
        const coverage = accSum / samples.length;
        // Overshoot penalty: fraction of ink points near any target. Sloppy
        // lines that stray away from the targets drag accuracy down so
        // 3-star ratings are earned, not automatic.
        let totalPts = 0, closePts = 0;
        const overshootTol = tol * 1.4;
        for (const ink of inkStrokes) {
            for (const p of ink) {
                totalPts++;
                let near = false;
                for (const t of samples) {
                    for (const q of t) {
                        if (Math.hypot(p[0] - q[0], p[1] - q[1]) < overshootTol) { near = true; break; }
                    }
                    if (near) break;
                }
                if (near) closePts++;
            }
        }
        const precision = totalPts === 0 ? 0 : closePts / totalPts;
        const accuracy = coverage * precision;
        return { ok: passing === samples.length, accuracy, passing, total: samples.length };
    }
    function rateAccuracy(a) {
        if (a >= 0.88) return { stars: 3, label: 'Masterweave!' };
        if (a >= 0.72) return { stars: 2, label: 'Nice!' };
        return { stars: 1, label: 'Woven' };
    }

    // ── Flow ───────────────────────────────────────────────────────────
    function loadLevel(i) {
        levelIdx = i;
        inkStrokes = [];
        currentStroke = null;
        levelLocked = false;
        setStageAspect();
        redrawInk();
        renderBackground();
        const word = currentWord();
        const letterCell = document.getElementById('hud-letter');
        letterCell.innerHTML = word
            .split('')
            .map(ch => `<span class="wchar active">${ch}</span>`)
            .join('');
        document.getElementById('hud-progress').textContent = i;
        document.getElementById('hint').textContent = 'Draw each missing thread';
    }

    function onLevelPassed(r) {
        if (levelLocked) return;
        levelLocked = true;
        const rating = rateAccuracy(r.accuracy);
        const gain = Math.round(100 * r.accuracy) * (rating.stars);
        score += gain;
        document.getElementById('hud-score').textContent = score;
        const stars = '★'.repeat(rating.stars) + '☆'.repeat(3 - rating.stars);
        toast(`${stars} ${rating.label} (+${gain})`, 'ok');
        setTimeout(() => {
            const nxt = levelIdx + 1;
            if (nxt >= TOTAL) {
                document.getElementById('hint').textContent = `Done! Final score: ${score}`;
                document.getElementById('hud-progress').textContent = TOTAL;
            } else {
                loadLevel(nxt);
            }
        }, 1100);
    }
    function toast(msg, kind) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show ' + (kind || '');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => el.classList.remove('show'), 1800);
    }

    document.getElementById('btn-clear').addEventListener('click', () => {
        if (levelLocked || inkStrokes.length === 0) return;
        inkStrokes.pop();
        currentStroke = null;
        redrawInk();
        document.getElementById('hint').textContent =
            inkStrokes.length === 0 ? 'Draw each missing thread' : 'Keep going…';
    });
    document.getElementById('btn-skip').addEventListener('click', () => {
        const nxt = levelIdx + 1;
        if (nxt < TOTAL) loadLevel(nxt);
    });

    loadLevel(0);
})();
</script>
</body>
</html>
