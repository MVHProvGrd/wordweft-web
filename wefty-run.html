    document.addEventListener('pointerdown', startMusic, { once: true });
    document.addEventListener('keydown', startMusic, { once: true });

    // ── Input ──────────────────────────────────────────────────────────
    const stage = document.getElementById('stage');
    let drawing = false;
    let currentStroke = null; // screen-space pts

    function pxToWorld(px, py) {
        return [world.cameraX + px / window.innerWidth, py / window.innerHeight];
    }
    function pointFromEvent(e) {
        if (e.touches && e.touches[0]) return [e.touches[0].clientX, e.touches[0].clientY];
        return [e.clientX, e.clientY];
    }

    let drawStart = 0;
    let drawMaxDrift = 0;
    function tutorialOpen() {
        return !tutorialEl.classList.contains('hidden');
    }
    function startDraw(e) {
        if (world.gameOver || world.isPaused || tutorialOpen()) return;
        e.preventDefault();
        drawing = true;
        world.isDrawing = true;
        drawStart = performance.now();
        drawMaxDrift = 0;
        currentStroke = [pointFromEvent(e)];
    }
    function moveDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        const [x, y] = pointFromEvent(e);
        const [sx, sy] = currentStroke[0];
        const drift = Math.hypot(x - sx, y - sy);
        if (drift > drawMaxDrift) drawMaxDrift = drift;
        const last = currentStroke[currentStroke.length - 1];
        if (Math.hypot(x - last[0], y - last[1]) < 3) return;
        // Clamp the live preview too — in screen pixels, 1/3 of the
        // canvas width. Once the pointer moves past the cap, stop
        // extending the visible stroke so the player sees the limit.
        const canvas = document.getElementById('fg');
        const maxSpanPx = canvas.clientWidth / 3;
        if (Math.abs(x - sx) > maxSpanPx) {
            const lastX = last[0], lastY = last[1];
            const dx = x - lastX;
            if (dx === 0) return;
            const allowed = maxSpanPx - Math.abs(lastX - sx);
            if (allowed <= 0) return;
            const step = allowed * Math.sign(dx);
            const t = step / dx;
            currentStroke.push([lastX + step, lastY + (y - lastY) * t]);
            return;
        }
        currentStroke.push([x, y]);
    }
    function endDraw(e) {
        if (!drawing) return;
        e.preventDefault();
        drawing = false;
        world.isDrawing = false;
        const held = performance.now() - drawStart;
        // Short, still tap → jump. Otherwise → bridge.
        if (held < 180 && drawMaxDrift < 16) {
            jump();
        } else if (currentStroke && currentStroke.length >= 2) {
            const worldPts = currentStroke.map(([x, y]) => pxToWorld(x, y));
            addStroke(worldPts);
        }
        currentStroke = null;
    }
    stage.addEventListener('mousedown', startDraw);
    stage.addEventListener('mousemove', moveDraw);
    stage.addEventListener('mouseup', endDraw);
    stage.addEventListener('touchstart', startDraw, { passive: false });
    stage.addEventListener('touchmove', moveDraw, { passive: false });
    stage.addEventListener('touchend', endDraw, { passive: false });
    stage.addEventListener('touchcancel', endDraw, { passive: false });

    // Jump button + keyboard. Pointer-down sets jumpHeld=true for glider
    // slow-fall; up/leave releases it. Same for keyboard.
    const jumpBtn = document.getElementById('btn-jump');
    const pressJump = (e) => { e.preventDefault(); e.stopPropagation(); world.jumpHeld = true; jump(); };
    const releaseJump = () => { world.jumpHeld = false; };
    jumpBtn.addEventListener('pointerdown', pressJump);
    jumpBtn.addEventListener('pointerup', releaseJump);
    jumpBtn.addEventListener('pointercancel', releaseJump);
    jumpBtn.addEventListener('pointerleave', releaseJump);
    const lassoBtn = document.getElementById('btn-lasso');
    lassoBtn.addEventListener('click', (e) => { e.stopPropagation(); fireLasso(); });

    // Inventory buttons.
    const invDJ = document.getElementById('inv-double-jump');
    const invSL = document.getElementById('inv-slow-mo');
    const invGL = document.getElementById('inv-glider');
    const invSH = document.getElementById('inv-shield');
    invDJ.addEventListener('click', (e) => { e.stopPropagation(); activateDoubleJump(); });
    invSL.addEventListener('click', (e) => { e.stopPropagation(); activateSlowMo(); });
    invGL.addEventListener('click', (e) => { e.stopPropagation(); activateGlider(); });
    invSH.addEventListener('click', (e) => { e.stopPropagation(); activateShield(); });
    // Keyboard shortcuts: 1-4 map to the four inventory buttons.
    document.addEventListener('keydown', (e) => {
        if (tutorialOpen()) return;
        if (e.code === 'Digit1') { e.preventDefault(); activateDoubleJump(); }
        else if (e.code === 'Digit2') { e.preventDefault(); activateSlowMo(); }
        else if (e.code === 'Digit3') { e.preventDefault(); activateGlider(); }
        else if (e.code === 'Digit4') { e.preventDefault(); activateShield(); }
    });
    document.addEventListener('keydown', (e) => {
        if (tutorialOpen()) {
            if (e.code === 'ArrowRight' || e.code === 'Enter' || e.code === 'Space') {
                e.preventDefault();
                if (tutorialPage < TUTORIAL.length - 1) { tutorialPage++; renderTutorial(); }
                else closeTutorial();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                if (tutorialPage > 0) { tutorialPage--; renderTutorial(); }
            } else if (e.code === 'Escape') {
                e.preventDefault();
                closeTutorial();
            }
            return;
        }
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            e.preventDefault();
            if (!world.jumpHeld) jump();
            world.jumpHeld = true;
        } else if (e.code === 'KeyL' || e.code === 'KeyF') {
            e.preventDefault();
            fireLasso();
        } else if (e.code === 'KeyP') {
            e.preventDefault();
            setPaused(!world.isPaused);
        } else if (e.code === 'KeyH' || e.code === 'Slash') {
            e.preventDefault();
            openTutorial(false);
        }
    });
    document.addEventListener('keyup', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
            world.jumpHeld = false;
        }
    });

    // ── Rendering ──────────────────────────────────────────────────────
    const distEl = document.getElementById('dist');
    const overlay = document.getElementById('game-over');
    const goScore = document.getElementById('go-score');
    document.getElementById('btn-restart').addEventListener('click', () => {
        resetWorld();
        overlay.classList.add('hidden');
        if (musicStarted) musicLoop.play().catch(() => {});
    });

    function renderFrame() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const palette = currentBiome() === 'STORM'
            ? WeftyThread.PALETTES[3]
            : WeftyThread.PALETTES[world.biomeIndex % WeftyThread.PALETTES.length];
        bgCtx.clearRect(0, 0, w, h);

        // Sky gradient — swings to crimson once the scissors storm is
        // active so the biome transition reads at a glance.
        const skyGrad = bgCtx.createLinearGradient(0, 0, 0, h);
        if (world.distance >= 30) {
            skyGrad.addColorStop(0, '#4A1010');
            skyGrad.addColorStop(1, '#1A0005');
        } else {
            skyGrad.addColorStop(0, '#0F0F23');
            skyGrad.addColorStop(1, '#1A1A2E');
        }
        bgCtx.fillStyle = skyGrad;
        bgCtx.fillRect(0, 0, w, h);

        const isStorm = world.distance >= 30;
        // Parallax background — tiles horizontally, scrolls 0.3x camera.
        // During the STORM biome we drop the alpha hard so the pink
        // backdrop doesn't wash out the crimson sky.
        if (parallaxImg.complete && parallaxImg.naturalWidth > 0) {
            const bgW = h * (parallaxImg.naturalWidth / parallaxImg.naturalHeight);
            const bgOffset = -((world.cameraX * 0.3 * w) % bgW);
            bgCtx.globalAlpha = isStorm ? 0.22 : 0.85;
            for (let x = bgOffset; x < w; x += bgW) {
                bgCtx.drawImage(parallaxImg, x, 0, bgW, h);
            }
            bgCtx.globalAlpha = 1;
        }
        // STORM overlay — crimson wash + diagonal rain streaks so the
        // biome shift reads at a glance.
        if (isStorm) {
            const grad = bgCtx.createLinearGradient(0, 0, 0, h * 0.85);
            grad.addColorStop(0, 'rgba(42, 0, 0, 0.55)');
            grad.addColorStop(1, 'rgba(92, 6, 6, 0.30)');
            bgCtx.fillStyle = grad;
            bgCtx.fillRect(0, 0, w, h * 0.85);
            const tick = world.frameTick || 0;
            const phase = (tick * 12) % h;
            bgCtx.strokeStyle = 'rgba(252, 165, 165, 0.25)';
            bgCtx.lineWidth = 2;
            bgCtx.beginPath();
            for (let i = 0; i < 28; i++) {
                const rx = (i * 73) % w;
                const ry = (i * 41 + phase) % h;
                bgCtx.moveTo(rx, ry);
                bgCtx.lineTo(rx - 18, ry + 42);
            }
            bgCtx.stroke();
        }

        // Floor shadow band
        const bandTop = PLATFORM_Y * h + h * 0.04;
        bgCtx.fillStyle = 'rgba(26, 22, 48, 0.45)';
        bgCtx.fillRect(0, bandTop, w, h - bandTop);

        // Platforms
        // Build platform paths in WORLD coordinates (multiplied by w/h)
        // then translate the ctx by -cameraX*w. The yarn pattern tiles
        // from ctx 0,0 so once we're in world coords the pattern stays
        // pinned to the platform instead of sliding across it.
        const samples = 24;
        const camOffsetX = world.cameraX * w;
        bgCtx.save();
        bgCtx.translate(-camOffsetX, 0);
        for (const p of world.platforms) {
            if (p.xEnd < world.cameraX || p.xStart > world.cameraX + 1) continue;
            const span = p.xEnd - p.xStart;
            function tracePath(ctx) {
                ctx.beginPath();
                for (let i = 0; i <= samples; i++) {
                    const t = i / samples;
                    const wx = (p.xStart + t * span) * w;
                    const yTop = p.crown
                        ? (p.top - p.crown * Math.sin(Math.PI * t)) * h
                        : p.top * h;
                    if (i === 0) ctx.moveTo(wx, yTop);
                    else ctx.lineTo(wx, yTop);
                }
            }

            tracePath(bgCtx);
            bgCtx.lineTo(p.xEnd * w, h);
            bgCtx.lineTo(p.xStart * w, h);
            bgCtx.closePath();
            // Yarn texture base
            bgCtx.fillStyle = '#2a2140';
            bgCtx.fill();
            if (yarnPattern) {
                bgCtx.save();
                bgCtx.globalCompositeOperation = 'multiply';
                bgCtx.globalAlpha = 0.70;
                bgCtx.fillStyle = yarnPattern;
                bgCtx.fill();
                bgCtx.restore();
            }
            // Biome tint — mossy green normally, crimson during the
            // scissors storm. Turns the off-white yarn into a landscape.
            const isStorm = world.distance >= 30;
            bgCtx.save();
            bgCtx.globalAlpha = 0.55;
            bgCtx.fillStyle = isStorm ? '#5C1A1A' : '#2F6B3A';
            bgCtx.fill();
            bgCtx.restore();
            // Depth gradient — darker toward the bottom
            bgCtx.save();
            const grad = bgCtx.createLinearGradient(0, p.top * h, 0, h);
            grad.addColorStop(0, 'rgba(17,17,17,0)');
            grad.addColorStop(1, 'rgba(17,17,17,0.35)');
            bgCtx.fillStyle = grad;
            bgCtx.fill();
            bgCtx.restore();
            // Grass / stitch line along the top edge
            tracePath(bgCtx);
            bgCtx.strokeStyle = isStorm ? '#FCA5A5' : '#86EFAC';
            bgCtx.lineWidth = 4;
            bgCtx.lineCap = 'round';
            bgCtx.lineJoin = 'round';
            bgCtx.stroke();
        }

        // Floating reward platforms — small elevated cushions with a
        // soft golden halo. Drawn inside the translate so yarn pattern
        // stays world-pinned.
        for (const f of world.floatingPlatforms) {
            if (f.xEnd < world.cameraX || f.xStart > world.cameraX + 1) continue;
            const fpw = (f.xEnd - f.xStart) * w;
            const fpx = f.xStart * w;
            const fpy = f.top * h;
            const fph = h * 0.035;
            // Halo
            bgCtx.fillStyle = 'rgba(251, 191, 36, 0.22)';
            bgCtx.beginPath();
            if (bgCtx.roundRect) bgCtx.roundRect(fpx - 6, fpy - 8, fpw + 12, fph + 16, fph);
            else bgCtx.rect(fpx - 6, fpy - 8, fpw + 12, fph + 16);
            bgCtx.fill();
            // Cushion
            if (yarnPattern) {
                bgCtx.save();
                bgCtx.globalAlpha = 0.75;
                bgCtx.fillStyle = yarnPattern;
                bgCtx.beginPath();
                if (bgCtx.roundRect) bgCtx.roundRect(fpx, fpy, fpw, fph, fph / 2);
                else bgCtx.rect(fpx, fpy, fpw, fph);
                bgCtx.fill();
                bgCtx.restore();
            }
            bgCtx.fillStyle = isStorm ? 'rgba(127, 29, 29, 0.55)' : 'rgba(47, 107, 58, 0.55)';
            bgCtx.beginPath();
            if (bgCtx.roundRect) bgCtx.roundRect(fpx, fpy, fpw, fph, fph / 2);
            else bgCtx.rect(fpx, fpy, fpw, fph);
            bgCtx.fill();
            bgCtx.strokeStyle = isStorm ? '#FCA5A5' : '#86EFAC';
            bgCtx.lineWidth = 3;
            bgCtx.beginPath();
            bgCtx.moveTo(fpx, fpy);
            bgCtx.lineTo(fpx + fpw, fpy);
            bgCtx.stroke();
        }
        bgCtx.restore();

        // Foreground: bridges, live stroke, Wefty
        fgCtx.clearRect(0, 0, w, h);
        const bridgeWidth = h * 0.024;

        // Gap guides — dashed hint line across each visible gap that isn't
        // already bridged. No "hard point" markers — any stroke across
        // the gap is valid.
        for (let i = 0; i < world.platforms.length - 1; i++) {
            const p1 = world.platforms[i];
            const p2 = world.platforms[i + 1];
            if (p2.xStart < world.cameraX || p1.xEnd > world.cameraX + 1) continue;
            const gapLeft = p1.xEnd, gapRight = p2.xStart;
            const bridged = world.bridges.some((b) =>
                b.pts.some(([wx, _]) => wx >= gapLeft && wx <= gapRight)
            );
            if (bridged) continue;
            const x1 = (gapLeft - world.cameraX) * w;
            const x2 = (gapRight - world.cameraX) * w;
            const gy = p1.top * h;
            fgCtx.save();
            fgCtx.strokeStyle = 'rgba(255,255,255,0.35)';
            fgCtx.lineWidth = 2;
            fgCtx.setLineDash([10, 12]);
            fgCtx.beginPath();
            fgCtx.moveTo(x1, gy);
            fgCtx.lineTo(x2, gy);
            fgCtx.stroke();
            fgCtx.restore();
        }

        for (const b of world.bridges) {
            const pts = b.pts.map(([wx, wy]) => [(wx - world.cameraX) * w, wy * h]);
            WeftyThread.drawThread(fgCtx, pts, palette, bridgeWidth, yarnPattern);
        }
        if (currentStroke && currentStroke.length >= 2) {
            WeftyThread.drawThread(fgCtx, currentStroke, palette, bridgeWidth * 0.9, yarnPattern);
        }

        // Power-up sprites — each pickup type draws its own PNG.
        function drawPickup(img, worldX, yWorld, sizePx, bobAmp) {
            if (!img.complete || !img.naturalWidth) return;
            if (worldX < world.cameraX - 0.1 || worldX > world.cameraX + 1.1) return;
            const sx = (worldX - world.cameraX) * w;
            const sy = yWorld * h + Math.sin(performance.now() / 450 + worldX * 8) * bobAmp;
            fgCtx.drawImage(img, sx - sizePx / 2, sy - sizePx / 2, sizePx, sizePx);
        }

        // Spring pads (platform-anchored, no bob)
        const padSize = h * 0.12;
        for (const s of world.springs) {
            if (s.consumed) continue;
            if (s.worldX < world.cameraX - 0.1 || s.worldX > world.cameraX + 1.1) continue;
            const sx = (s.worldX - world.cameraX) * w;
            const sy = s.y * h;
            if (springImg.complete && springImg.naturalWidth) {
                fgCtx.drawImage(springImg, sx - padSize / 2, sy - padSize * 0.9, padSize, padSize);
            }
        }

        // Airborne pickups with a gentle bob
        const pickupSize = h * 0.13;
        for (const g of world.gliders)      if (!g.collected)  drawPickup(gliderImg, g.worldX, g.y, pickupSize, 4);
        for (const dj of world.doubleJumps) if (!dj.collected) drawPickup(djImg, dj.worldX, dj.y, pickupSize, 4);
        for (const sm of world.slowMos)     if (!sm.collected) drawPickup(slowMoImg, sm.worldX, sm.y, pickupSize, 4);
        for (const sh of world.shields)     if (!sh.collected) drawPickup(shieldImg, sh.worldX, sh.y, pickupSize, 4);

        // Floor knots (Level 2) — angry shake: small jitter + rotation
        // + red halo pulse so they read as hostile instead of scenery.
        const knotSize = h * 0.11;
        const tickNow = world.frameTick || 0;
        for (const k of world.knots) {
            if (k.worldX < world.cameraX - 0.1 || k.worldX > world.cameraX + 1.1) continue;
            const sx = (k.worldX - world.cameraX) * w;
            const sy = k.y * h;
            const phase = tickNow * 0.6 + k.worldX * 30;
            const jitterX = Math.sin(phase) * (w * 0.004);
            const jitterY = Math.cos(phase * 1.3) * (h * 0.004);
            const rotDeg = Math.sin(phase * 0.7) * 8 * Math.PI / 180;
            const halo = 0.5 + 0.5 * Math.abs(Math.sin(phase * 0.4));
            // Red angry halo
            fgCtx.save();
            fgCtx.fillStyle = `rgba(220, 38, 38, ${0.25 * halo})`;
            fgCtx.beginPath();
            fgCtx.arc(sx + jitterX, sy - knotSize * 0.35 + jitterY, knotSize * 0.65, 0, Math.PI * 2);
            fgCtx.fill();
            fgCtx.restore();
            if (knotImg.complete && knotImg.naturalWidth) {
                fgCtx.save();
                fgCtx.translate(sx + jitterX, sy + jitterY);
                fgCtx.rotate(rotDeg);
                fgCtx.drawImage(knotImg, -knotSize / 2, -knotSize * 0.85, knotSize, knotSize);
                fgCtx.restore();
            }
        }

        // Heart pickups — procedural heart silhouette (+1 needle).
        for (const hrt of world.hearts) {
            if (hrt.collected) continue;
            if (hrt.worldX < world.cameraX - 0.1 || hrt.worldX > world.cameraX + 1.1) continue;
            const sx = (hrt.worldX - world.cameraX) * w;
            const sy = hrt.y * h + Math.sin(performance.now() / 400 + hrt.worldX * 8) * 4;
            const r = h * 0.032;
            fgCtx.save();
            fgCtx.fillStyle = 'rgba(17,17,17,0.45)';
            fgCtx.beginPath();
            fgCtx.arc(sx, sy + 2, r + 4, 0, Math.PI * 2);
            fgCtx.fill();
            fgCtx.fillStyle = '#EF4444';
            fgCtx.beginPath(); fgCtx.arc(sx - r * 0.40, sy - r * 0.10, r * 0.58, 0, Math.PI * 2); fgCtx.fill();
            fgCtx.beginPath(); fgCtx.arc(sx + r * 0.40, sy - r * 0.10, r * 0.58, 0, Math.PI * 2); fgCtx.fill();
            fgCtx.beginPath();
            fgCtx.moveTo(sx - r * 0.95, sy + r * 0.05);
            fgCtx.lineTo(sx + r * 0.95, sy + r * 0.05);
            fgCtx.lineTo(sx, sy + r * 0.95);
            fgCtx.closePath();
            fgCtx.fill();
            fgCtx.fillStyle = 'rgba(255,255,255,0.55)';
            fgCtx.beginPath(); fgCtx.arc(sx - r * 0.45, sy - r * 0.30, r * 0.18, 0, Math.PI * 2); fgCtx.fill();
            fgCtx.restore();
        }

        // Word-letter collectibles
        for (const lt of world.letters) {
            if (lt.collected) continue;
            if (lt.worldX < world.cameraX - 0.1 || lt.worldX > world.cameraX + 1.1) continue;
            const sx = (lt.worldX - world.cameraX) * w;
            const sy = lt.y * h + Math.sin(performance.now() / 400 + lt.worldX * 10) * 4;
            const r = h * 0.035;
            // Halo + body
            fgCtx.save();
            fgCtx.fillStyle = palette.dark;
            fgCtx.beginPath(); fgCtx.arc(sx, sy, r + 2, 0, Math.PI * 2); fgCtx.fill();
            fgCtx.fillStyle = palette.main;
            fgCtx.beginPath(); fgCtx.arc(sx, sy, r, 0, Math.PI * 2); fgCtx.fill();
            fgCtx.fillStyle = '#fff';
            fgCtx.font = `bold ${Math.round(r * 1.2)}px -apple-system, system-ui, sans-serif`;
            fgCtx.textAlign = 'center';
            fgCtx.textBaseline = 'middle';
            fgCtx.fillText(lt.letter, sx, sy + 1);
            fgCtx.restore();
        }

        // Needle icons — crossed knitting needles + yarn-ball lives.
        // Centered at the top so they don't overlap the WEFTY letters
        // tucked into the left corner. Supports up to MAX_NEEDLES = 5.
        if (needleImg.complete && needleImg.naturalWidth > 0) {
            const size = 40;
            const gap = 2;
            const slots = Math.min(5, Math.max(3, world.needles));
            const rowW = slots * size + (slots - 1) * gap;
            const startX = (w - rowW) / 2;
            const ny = 12;
            const now = performance.now();
            for (let i = 0; i < slots; i++) {
                const nx = startX + i * (size + gap);
                const alive = i < world.needles;
                const invi = world.invincibleUntil > now;
                let alpha;
                if (invi && i === world.needles) {
                    alpha = 0.3 + 0.5 * ((Math.floor(now / 33) % 20) / 20);
                } else {
                    alpha = alive ? 1 : 0.25;
                }
                fgCtx.save();
                fgCtx.globalAlpha = alpha;
                fgCtx.drawImage(needleImg, nx, ny, size, size);
                fgCtx.restore();
            }
        }

        // Show collected-letter progress in a small HUD row
        if (world.collectedLetters.size > 0) {
            const WEFTY = ['W','E','F','T','Y'];
            fgCtx.save();
            fgCtx.font = 'bold 14px -apple-system, system-ui, sans-serif';
            let xOff = 14;
            for (const ch of WEFTY) {
                const got = world.collectedLetters.has(ch);
                fgCtx.fillStyle = got ? palette.main : 'rgba(160,160,184,0.35)';
                fgCtx.fillText(ch, xOff, 64);
                xOff += 18;
            }
            fgCtx.restore();
        }

        // Hazards — 2-frame chomp animation (open ↔ closed) with per-
        // scissor phase offset so the swarm chomps out of unison.
        {
            const hSize = h * 0.10;
            const tick = world.frameTick || 0;
            const openReady = scissorsOpenImg.complete && scissorsOpenImg.naturalWidth > 0;
            const closedReady = scissorsClosedImg.complete && scissorsClosedImg.naturalWidth > 0;
            const fallback = (scissorsImg.complete && scissorsImg.naturalWidth > 0) ? scissorsImg : null;
            for (const hz of world.hazards) {
                if (hz.worldX < world.cameraX - 0.1 || hz.worldX > world.cameraX + 1.1) continue;
                const sx = (hz.worldX - world.cameraX) * w;
                const sy = hz.y * h;
                const phase = tick * 0.22 + hz.worldX * 9;
                const frame = Math.sin(phase) > 0
                    ? (openReady ? scissorsOpenImg : fallback)
                    : (closedReady ? scissorsClosedImg : fallback);
                if (!frame) continue;
                fgCtx.save();
                fgCtx.translate(sx, sy);
                fgCtx.rotate(hz.rot);
                fgCtx.drawImage(frame, -hSize / 2, -hSize / 2, hSize, hSize);
                fgCtx.restore();
            }
        }

        // Wefty is a yarn ball → she ROLLS. Continuous rotation
        // proportional to world distance so the roll syncs with the
        // terrain scrolling. Airborne → fall pose (frozen).
        const shrunk = world.shrinkUntil > performance.now();
        const baseSize = Math.max(h * 0.165, 54);   // 0.75× — more world visible
        const sSize = shrunk ? baseSize * 0.55 : baseSize;
        const cx = WEFTY_SCREEN_X * w;
        const feetY = world.weftyY * h;
        const sprite = !world.grounded ? weftyFall : weftyRunA;
        const circ = sSize * Math.PI;
        const rollDeg = world.grounded ? (world.cameraX * w / circ) * 360 : 0;
        const iframes = world.invincibleUntil > performance.now();
        const blink = iframes ? (Math.floor(performance.now() / 50) % 2 === 0 ? 0.4 : 1) : 1;
        if (sprite.complete && sprite.naturalWidth > 0) {
            fgCtx.save();
            fgCtx.globalAlpha = blink;
            // Ball occupies 72% of the 256px sprite canvas (centered), so
            // its bottom is at 0.86 of canvas height. Anchor rotation at
            // the ball center — 0.36 * sSize above feetY — so the ball
            // bottom actually touches the ground and the roll spin is
            // around the ball's own axis.
            fgCtx.translate(cx, feetY - sSize * 0.36);
            fgCtx.rotate(rollDeg * Math.PI / 180);
            fgCtx.drawImage(sprite, -sSize / 2, -sSize / 2, sSize, sSize);
            fgCtx.restore();
        } else {
            fgCtx.fillStyle = palette.main;
            fgCtx.beginPath(); fgCtx.arc(cx, feetY - h * 0.07, h * 0.055, 0, Math.PI * 2); fgCtx.fill();
        }

        // Lasso flash — yarn thread from Wefty to the scissor she just
        // snagged. Short-lived so it reads as an attack, not a tether.
        if ((world.frameTick || 0) < world.lassoFlashUntilTick) {
            const fromX = WEFTY_SCREEN_X * w;
            const fromY = world.weftyY * h - h * 0.08;
            const toX = (world.lassoLastHitX - world.cameraX) * w;
            const toY = world.lassoLastHitY * h;
            WeftyThread.drawThread(
                fgCtx,
                [[fromX, fromY], [toX, toY]],
                WeftyThread.PALETTES[2], // amber, matches the lasso button
                h * 0.018,
                yarnPattern,
            );
        }
        // Cooldown visual on the lasso button
        if ((world.frameTick || 0) < world.lassoReadyAtTick) {
            lassoBtn.classList.add('cooldown');
        } else {
            lassoBtn.classList.remove('cooldown');
        }

        // HUD
        const cur = Math.round(world.distance * 10);
        distEl.textContent = `best ${bestDistance} m   ${cur} m`;
        if (world.gameOver) {
            overlay.classList.remove('hidden');
            goScore.textContent = `Distance ${cur} m${cur >= bestDistance ? ' (new best!)' : ''}`;
        }

        // Inventory badges — light up when there's stock, highlight when
        // the effect is active.
        const now = performance.now();
        const updateInv = (btn, count, active) => {
            btn.querySelector('.count').textContent = count;
            btn.classList.toggle('has', count > 0);
            btn.classList.toggle('active', active);
        };
        updateInv(invDJ, world.invDoubleJump, world.doubleJumpUntil > now);
        updateInv(invSL, world.invSlowMo,     world.slowMoUntil     > now);
        updateInv(invGL, world.invGlider,     world.gliderUntil     > now);
        updateInv(invSH, world.invShield,     world.shieldCharges   > 0);

        // Active chips
        const chips = [];
        if (world.shrinkUntil > now)     chips.push(['Shrink',  Math.ceil((world.shrinkUntil     - now) / 1000)]);
        if (world.doubleJumpUntil > now) chips.push(['2×',      Math.ceil((world.doubleJumpUntil - now) / 1000)]);
        if (world.slowMoUntil > now)     chips.push(['Slow',    Math.ceil((world.slowMoUntil     - now) / 1000)]);
        if (world.gliderUntil > now)     chips.push(['Glide',   Math.ceil((world.gliderUntil     - now) / 1000)]);
        if (world.shieldCharges > 0)     chips.push(['Shield', -1]);
        const chipsEl = document.getElementById('active-chips');
        chipsEl.innerHTML = chips.map(([name, secs]) =>
            `<div class="chip">${name}${secs < 0 ? '' : ' ' + secs + 's'}</div>`
        ).join('');
    }

    // ── Orientation gate ───────────────────────────────────────────────
    // Mobile browsers don't expose a way for an unprivileged page to
    // force landscape without fullscreen. So: pause whenever the viewport
    // is portrait, show a "rotate" overlay, and offer a button that
    // requests fullscreen + screen.orientation.lock('landscape') when
    // that's supported.
    const rotateOverlay = document.getElementById('rotate-overlay');
    function isPortrait() { return window.innerHeight > window.innerWidth; }
    function updateRotate() {
        if (isPortrait()) {
            rotateOverlay.classList.remove('hidden');
            try { musicLoop.pause(); } catch (_) {}
        } else {
            rotateOverlay.classList.add('hidden');
            if (musicStarted && !world.gameOver) {
                musicLoop.play().catch(() => {});
            }
        }
    }
    window.addEventListener('resize', updateRotate);
    window.addEventListener('orientationchange', updateRotate);
    updateRotate();
    // Pause button + overlay tap-to-resume.
    const pauseOverlay = document.getElementById('pause-overlay');
    const pauseBtn = document.getElementById('btn-pause');
    function setPaused(p) {
        world.isPaused = p;
        pauseBtn.textContent = p ? '▶' : '‖';
        if (p) {
            pauseOverlay.classList.remove('hidden');
            try { musicLoop.pause(); } catch (_) {}
        } else {
            pauseOverlay.classList.add('hidden');
            if (musicStarted && !world.gameOver) musicLoop.play().catch(() => {});
        }
    }
    pauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        setPaused(!world.isPaused);
    });
    pauseOverlay.addEventListener('click', () => setPaused(false));
    async function toggleFullscreen() {
        const root = document.documentElement;
        try {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) await document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            } else {
                if (root.requestFullscreen) await root.requestFullscreen();
                else if (root.webkitRequestFullscreen) root.webkitRequestFullscreen();
                if (screen.orientation && screen.orientation.lock) {
                    try { await screen.orientation.lock('landscape'); } catch (_) {}
                }
            }
        } catch (_) {}
        updateRotate();
    }
    document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
    document.getElementById('btn-fs').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFullscreen();
    });

    // ── Loop ───────────────────────────────────────────────────────────
    let last = 0;
    function frame(ts) {
        const dt = last ? Math.min((ts - last) / 1000, 1 / 30) : 0;
        last = ts;
        // Freeze the simulation while the portrait overlay is up so the
        // player doesn't discover they lost all 3 needles when they finally
        // rotate their phone.
        if (!isPortrait()) {
            if (world.tutorialMode) tutorialAutoplay();
            step(dt);
            drainEvents();
        }
        renderFrame();
        requestAnimationFrame(frame);
    }

    // Scripted autoplay driver — watches the world for upcoming hazards
    // and gaps, and feeds jump + bridge inputs so Wefty survives the
    // demo loop while the player reads the tutorial panels.
    function tutorialAutoplay() {
        if (world.gameOver) return;
        const wx = world.cameraX + WEFTY_SCREEN_X;
        // Jump if a hazard is close ahead and we're grounded.
        if (world.grounded) {
            for (const hz of world.hazards) {
                const d = hz.worldX - wx;
                if (d > 0.04 && d < 0.28 && hz.y > world.weftyY - 0.25) {
                    jump();
                    return;
                }
            }
            for (const k of world.knots) {
                const d = k.worldX - wx;
                if (d > 0.04 && d < 0.22) { jump(); return; }
            }
        }
        // Draw a bridge across the next gap as soon as it comes into
        // view, but only if we haven't already covered it.
        for (let i = 0; i < world.platforms.length - 1; i++) {
            const p1 = world.platforms[i];
            const p2 = world.platforms[i + 1];
            if (p2.xStart < wx) continue;               // already passed
            if (p1.xEnd > wx + 0.9) break;              // too far ahead
            const covered = world.bridges.some(b =>
                b.pts.some(([bx]) => bx >= p1.xEnd - 0.02 && bx <= p2.xStart + 0.02)
            );
            if (covered) continue;
            // Synthesize a short stroke spanning the gap along the
            // platform tops so supportYAt catches Wefty's feet.
            const from = [p1.xEnd - 0.01, p1.top - 0.005];
            const to   = [p2.xStart + 0.01, p2.top - 0.005];
            addStroke([from, to]);
            return;
        }
        // Activate any power-up the demo has in stock so the player
        // sees every effect happen.
        if (world.invDoubleJump > 0) activateDoubleJump();
        else if (world.invSlowMo > 0) activateSlowMo();
        else if (world.invGlider > 0) activateGlider();
        else if (world.invShield > 0) activateShield();
    }
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
