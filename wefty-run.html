<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Wefty Run</title>
<style>
    :root {
        --bg-0: #0F0F23;
        --bg-1: #1A1A2E;
        --muted: #A0A0B8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
        margin: 0;
        width: 100%; height: 100%;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
        overflow: hidden;
        user-select: none;
    }
    header {
        position: absolute;
        top: 0; left: 0; right: 0;
        padding: 10px 14px;
        display: flex; align-items: center; gap: 10px;
        z-index: 5;
    }
    header a.back { color: var(--muted); text-decoration: none; font-size: 14px; }
    header .title { font-weight: 700; font-size: 16px; }
    header .dist { margin-left: auto; color: var(--muted); font-size: 13px; }
    #stage {
        position: absolute;
        inset: 0;
        touch-action: none;
    }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    .jump-btn {
        position: absolute;
        right: 20px; bottom: 20px;
        width: 76px; height: 76px;
        border-radius: 50%;
        border: none;
        background: rgba(16, 185, 129, 0.88);
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        z-index: 6;
        touch-action: manipulation;
    }
    .jump-btn:active { transform: scale(0.95); }
    .lasso-btn {
        position: absolute;
        right: 108px; bottom: 24px;
        width: 64px; height: 64px;
        border-radius: 50%;
        border: none;
        background: rgba(245, 158, 11, 0.88);
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        z-index: 6;
        touch-action: manipulation;
        transition: opacity 0.15s ease;
    }
    .lasso-btn.cooldown { opacity: 0.35; }
    .lasso-btn:active { transform: scale(0.95); }
    .inv-btn {
        position: absolute;
        bottom: 34px;
        width: 54px; height: 54px;
        border: none;
        border-radius: 14px;
        color: #fff;
        font-weight: 700;
        font-size: 11px;
        cursor: pointer;
        z-index: 6;
        touch-action: manipulation;
        opacity: 0.25;
        transition: opacity 0.15s ease, transform 0.1s ease;
    }
    .inv-btn.has { opacity: 0.9; }
    .inv-btn.active { opacity: 1; box-shadow: 0 0 0 3px #fff inset; }
    .inv-btn:active { transform: scale(0.95); }
    .inv-btn .count {
        position: absolute;
        top: 3px; right: 3px;
        background: rgba(0,0,0,0.72);
        color: #fff;
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 8px;
        min-width: 14px;
        text-align: center;
    }
    .inv-2x    { background: #22C55E; left: 20px; }
    .inv-slow  { background: #8B5CF6; left: 80px; }
    .inv-glide { background: #0EA5E9; left: 140px; }
    .inv-shield{ background: #FBBF24; left: 200px; }
    .active-chips {
        position: absolute;
        top: 72px; left: 16px;
        display: flex; gap: 6px;
        z-index: 6;
    }
    .active-chips .chip {
        background: rgba(0,0,0,0.55);
        color: #fff;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
    }
    .storm-banner {
        position: absolute;
        top: 38%; left: 50%;
        transform: translateX(-50%);
        background: rgba(74, 16, 16, 0.82);
        color: #fff;
        padding: 16px 28px;
        border-radius: 22px;
        text-align: center;
        z-index: 12;
        pointer-events: none;
    }
    .storm-banner.hidden { display: none; }
    .storm-banner .title { color: #FBBF24; font-size: 20px; font-weight: 700; }
    .storm-banner .sub { font-size: 13px; margin-top: 4px; }
    .unlock-toast {
        position: absolute;
        top: 52px; left: 50%;
        transform: translateX(-50%);
        background: rgba(245, 158, 11, 0.96);
        color: #1a1a2e;
        padding: 10px 18px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 14px;
        z-index: 12;
    }
    .unlock-toast.hidden { display: none; }
    .help-btn {
        position: absolute;
        right: 12px; top: 40px;
        width: 36px; height: 36px;
        border-radius: 50%;
        border: none;
        background: rgba(255,255,255,0.15);
        color: #fff;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        z-index: 6;
    }

    .tutorial {
        position: absolute; left: 0; right: 0; bottom: 0;
        background: transparent;
        display: flex; align-items: flex-end; justify-content: center;
        padding: 0 0 18px;
        pointer-events: none;          /* only the card catches clicks */
        z-index: 50;                   /* above the pause overlay (40) */
    }
    .tutorial .tutorial-card { pointer-events: auto; }
    .tutorial::before {
        /* A subtle gradient wash behind the card so text stays readable
           even with the game visibly running. */
        content: '';
        position: absolute; left: 0; right: 0; bottom: 0;
        height: 52%;
        background: linear-gradient(0deg, rgba(15,15,35,0.85) 20%, rgba(15,15,35,0) 100%);
        pointer-events: none;
        z-index: -1;
    }
    .tutorial.hidden { display: none; }
    .tutorial-card {
        text-align: center;
        max-width: 620px;
        padding: 16px 28px 18px;
        background: rgba(15, 15, 35, 0.82);
        border-radius: 18px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }
    .tutorial-card img { width: 72px; height: 72px; object-fit: contain; }
    .tutorial-card h2 { margin: 6px 0 4px; font-size: 19px; }
    .tutorial-card p { color: #d0d0e0; font-size: 13px; line-height: 1.4; margin: 0 0 10px; }
    .tut-keys {
        display: inline-grid;
        grid-template-columns: auto auto;
        column-gap: 18px;
        row-gap: 4px;
        margin: 0 auto 10px;
        text-align: left;
        font-size: 13px;
    }
    .tut-key-row { display: contents; }
    .tut-key-label { color: #d0d0e0; }
    .tut-key-combo { color: #fff; font-weight: 700; font-family: ui-monospace, monospace; }
    .tutorial-dots { display: flex; justify-content: center; gap: 6px; margin: 8px 0 18px; }
    .tutorial-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.35); }
    .tutorial-dot.active { width: 9px; height: 9px; background: #fff; }
    .tutorial-buttons { display: flex; justify-content: center; gap: 10px; }
    .tutorial-buttons button {
        background: transparent;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 999px;
        padding: 8px 18px;
        font: inherit;
        cursor: pointer;
    }
    .tutorial-buttons .skip {
        color: #707085;
        border-color: transparent;
    }

    .game-over {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center; justify-content: center;
        background: rgba(10, 10, 25, 0.55);
        z-index: 10;
    }
    .game-over.hidden { display: none; }

    /* Portrait-mode gate — mobile browsers don't let us force
       landscape, so pause gameplay and ask the player to rotate. */
    .rotate-overlay {
        position: absolute;
        inset: 0;
        background: rgba(15, 15, 35, 0.98);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 40;
        text-align: center;
    }
    .rotate-overlay.hidden { display: none; }
    .rotate-overlay .icon {
        font-size: 72px;
        display: inline-block;
        animation: rotate-tilt 2.2s ease-in-out infinite;
    }
    @keyframes rotate-tilt {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-90deg); }
    }
    .rotate-overlay h2 { margin: 14px 0 6px; font-size: 22px; }
    .rotate-overlay p { color: #c0c0d0; font-size: 14px; margin: 0 0 20px; }
    .rotate-overlay button {
        background: rgba(16, 185, 129, 0.88);
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 10px 22px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
    }
    .go-panel {
        background: rgba(30, 30, 54, 0.96);
        border-radius: 20px;
        padding: 22px 28px;
        text-align: center;
    }
    .go-panel h2 { margin: 0 0 6px; font-size: 22px; }
    .go-panel .score { color: var(--muted); font-size: 15px; margin-bottom: 10px; }
    .go-panel .scoreboard {
        margin: 0 auto 16px;
        font-size: 13px;
        color: #d0d0e0;
        text-align: left;
        display: inline-grid;
        grid-template-columns: auto auto auto;
        column-gap: 14px;
        row-gap: 3px;
    }
    .go-panel .scoreboard .rank { color: #888; text-align: right; }
    .go-panel .scoreboard .dist { color: #fff; font-weight: 700; font-family: ui-monospace, monospace; }
    .go-panel .scoreboard .when { color: #8888a0; font-size: 11px; }
    .go-panel .scoreboard .new { color: #FBBF24; }
    .go-panel .scoreboard .hdr { color: #fff; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; margin-bottom: 4px; grid-column: 1 / -1; text-align: center; }
    .go-panel button {
        background: transparent;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 999px;
        padding: 8px 16px;
        margin: 0 4px;
        font: inherit;
        cursor: pointer;
    }
    .go-panel button:hover { background: rgba(255,255,255,0.05); }
    .go-panel a.back-link { color: var(--muted); text-decoration: none; }
</style>
</head>
<body>
<header>
    <a class="back" href="wefty-hub.html">← Hub</a>
    <div class="title">Wefty Run</div>
    <div class="dist" id="dist">0 m</div>
</header>
<div id="stage">
    <canvas id="bg"></canvas>
    <canvas id="fg"></canvas>
</div>
<button id="btn-pause" class="help-btn" style="right:56px;top:40px;">‖</button>
<button id="btn-fs" class="help-btn" style="right:100px;top:40px;" title="Toggle fullscreen">⛶</button>
<button id="inv-double-jump" class="inv-btn inv-2x">2×<span class="count">0</span></button>
<button id="inv-slow-mo"     class="inv-btn inv-slow">Slow<span class="count">0</span></button>
<button id="inv-glider"      class="inv-btn inv-glide">Glide<span class="count">0</span></button>
<button id="inv-shield"      class="inv-btn inv-shield">Shield<span class="count">0</span></button>
<button id="btn-lasso" class="lasso-btn">Lasso</button>
<button id="btn-jump" class="jump-btn">Jump</button>
<div id="active-chips" class="active-chips"></div>
<div id="storm-banner" class="storm-banner hidden">
    <div class="title">⚡ SCISSORS STORM</div>
    <div class="sub">300 m — watch for knots on the ground.</div>
</div>
<div id="unlock-toast" class="unlock-toast hidden">✨ Level unlocked!</div>
<div id="pause-overlay" class="rotate-overlay hidden">
    <div>
        <div class="icon" style="animation:none;">‖</div>
        <h2>Paused</h2>
        <p>Tap anywhere to resume.</p>
    </div>
</div>
<div id="rotate-overlay" class="rotate-overlay hidden">
    <div>
        <div class="icon">📱</div>
        <h2>Rotate your phone</h2>
        <p>Wefty Run plays in landscape.<br>Turn your phone sideways to keep rolling.</p>
        <button id="btn-fullscreen">Lock landscape</button>
    </div>
</div>
<button id="btn-help" class="help-btn">?</button>
<div id="tutorial" class="tutorial">
    <div class="tutorial-card">
        <img id="tut-icon" src="wefty_wave.png" alt="">
        <h2 id="tut-title"></h2>
        <p id="tut-body"></p>
        <div class="tutorial-dots" id="tut-dots"></div>
        <div class="tutorial-buttons">
            <button id="tut-back">Back</button>
            <button id="tut-next">Next</button>
        </div>
        <div class="tutorial-buttons" style="margin-top: 8px;">
            <button class="skip" id="tut-skip">Skip</button>
        </div>
    </div>
</div>
<div id="game-over" class="game-over hidden">
    <div class="go-panel">
        <h2>Run over</h2>
        <div class="score" id="go-score">Distance 0 m</div>
        <div class="scoreboard" id="go-scoreboard"></div>
        <button id="btn-restart">Restart</button>
        <a class="back-link" href="wefty-hub.html"><button>Back to Hub</button></a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="sound.js"></script>
<script src="wefty-thread.js"></script>
<script>
(() => {
    // Kick off Firebase auth early so by the time the player finishes
    // a run we already know their uid + displayName. Fire-and-forget —
    // the game is fully playable offline and scores just won't publish.
    (async () => {
        try {
            if (typeof Auth !== 'undefined') {
                await Auth.init();
                await Auth.ensureSignedIn();
            }
        } catch (_) {}
    })();

    // ── Constants (mirror of WeftyRunWorld companion) ──────────────────
    const PLATFORM_Y = 0.72;
    const DEATH_Y = 1.10;
    const GRAVITY = 2.4;
    const RUN_SPEED = 0.20;
    const WEFTY_SCREEN_X = 0.25;
    const JUMP_VELOCITY = 1.35;
    const HAZARD_RADIUS = 0.04;

    // ── World state ────────────────────────────────────────────────────
    const world = {
        cameraX: 0,
        weftyY: PLATFORM_Y,
        weftyVy: 0,
        grounded: true,
        distance: 0,
        gameOver: false,
        biomeIndex: 0,
        lastMilestone: 0,
        isDrawing: false,  // pause cameraX while the player is drawing
        platforms: [],  // {xStart, xEnd, top, crown}
        bridges: [],    // {pts:[[x,y]], valid, ttl}
        hazards: [],    // {worldX, y, rot}
        lastHazardAtX: -10,
        lastKnotAtX: -10,
        letters: [],    // collectible WEFTY letter tokens {worldX, y, letter, collected}
        collectedLetters: new Set(),  // chars of WEFTY already collected this shrink cycle
        springs: [],    // bouncy pads on platforms {worldX, y, consumed}
        gliders: [],    // airborne kite pickups {worldX, y, collected}
        doubleJumps: [],// green orb pickups {worldX, y, collected}
        slowMos: [],    // clock-yarn pickups {worldX, y, collected}
        shields: [],    // yarn-shield pickups {worldX, y, collected}
        hearts: [],     // +1 needle pickups {worldX, y, collected}
        knots: [],      // floor hazards (Level 2) {worldX, y}
        floatingPlatforms: [], // small elevated ledges {xStart, xEnd, top}
        gliderUntil: 0, // performance.now() while glider mode active
        doubleJumpUntil: 0, // performance.now() while double-jump available window active
        doubleJumpAvailable: false, // one free in-air re-jump per airborne period
        slowMoUntil: 0,  // performance.now() while slow-mo active
        shieldCharges: 0,
        // Inventory — pickups accumulate here; player taps a button to
        // activate each effect when beneficial.
        invDoubleJump: 0,
        invSlowMo: 0,
        invGlider: 0,
        invShield: 0,
        jumpHeld: false, // true while jump input is held (for glider slow-fall)
        tutorialMode: false, // true while tutorial overlay is open
        shrinkUntil: 0, // performance.now() timestamp — Wefty is small until then
        needles: 3,    // lives, themed as knitting needles
        invincibleUntil: 0, // performance.now() while i-frames active
        isPaused: false,
        lassoReadyAtTick: 0,
        lassoLastHitX: 0,
        lassoLastHitY: 0,
        lassoFlashUntilTick: 0,
        frameTick: 0,
        events: [],     // 'bridge-valid' | 'milestone' | 'game-over' | 'jump' | 'hazard-hit' | 'spring' | 'glider' | 'double-jump' | 'slow-mo' | 'shield' | 'shield-broken'
    };
    // Biome: NORMAL default, STORM at/past 50m.
    function currentBiome() { return world.distance >= 30 ? 'STORM' : 'NORMAL'; }

    // Local best distance + personal top-5 scoreboard
    let bestDistance = parseInt(localStorage.getItem('wefty_run_best') || '0', 10) || 0;
    function loadHistory() {
        try {
            const raw = localStorage.getItem('wefty_run_history');
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
        } catch (_) { return []; }
    }
    function recordRun(score) {
        const list = loadHistory();
        const ts = Date.now();
        list.push({ score, ts });
        list.sort((a, b) => b.score - a.score);
        const top = list.slice(0, 5);
        try { localStorage.setItem('wefty_run_history', JSON.stringify(top)); } catch (_) {}
        return ts;
    }
    function formatWhen(ts) {
        const d = Date.now() - ts;
        if (d < 60_000) return 'just now';
        if (d < 3_600_000) return Math.floor(d / 60_000) + 'm ago';
        if (d < 86_400_000) return Math.floor(d / 3_600_000) + 'h ago';
        const days = Math.floor(d / 86_400_000);
        return days + (days === 1 ? ' day ago' : ' days ago');
    }
    function renderScoreboard(justScored) {
        const el = document.getElementById('go-scoreboard');
        if (!el) return;
        const list = loadHistory();
        if (list.length === 0) { el.innerHTML = ''; return; }
        let html = '<div class="hdr">PERSONAL TOP 5</div>';
        list.forEach((r, i) => {
            const isNew = justScored && r.ts === justScored;
            html += `<span class="rank">${i + 1}.</span>` +
                    `<span class="dist${isNew ? ' new' : ''}">${r.score} m${isNew ? '  ★' : ''}</span>` +
                    `<span class="when">${formatWhen(r.ts)}</span>`;
        });
        el.innerHTML = html;
    }

    // Tutorial pages — kept here so we add more panels alongside new features.
    const TUTORIAL = [
        { icon: 'wefty_wave.png', title: 'Meet Wefty',
          body: 'Wefty runs forever — your job is to keep her going. The further, the higher your score.' },
        { icon: 'wefty.png', title: 'Bridge the gaps',
          body: 'Draw a thread across any gap and Wefty walks across. Any stroke works — the longer the gap, the longer the bridge.' },
        { icon: 'wefty_celebrate.png', title: 'Tap to jump',
          body: 'A short tap jumps. Hit the green Jump button, or press Space / ↑ on web.' },
        { icon: 'scissors_hazard.png', title: 'Dodge the scissors',
          body: 'Spinning scissors float above platforms. Jump under them or tap the orange Lasso to snag the nearest one (1.5s cooldown).' },
        { icon: 'wefty.png', title: 'Spell WEFTY',
          body: 'Grab the floating W · E · F · T · Y letters. Collect all five and Wefty shrinks for 18 seconds — scissors fly right over her.' },
        { icon: 'spring_pad.png', title: 'Spring pads',
          body: 'Red spring pads on the ground super-jump Wefty skyward. They trigger automatically — just roll over one.' },
        { icon: 'double_jump.png', title: 'Power-up inventory',
          body: 'Blue kite, green orb, lilac clock, and navy shield go into your inventory. Tap the coloured buttons (or 1–4) to activate: 2× double-jump, Slow 5s slow-mo, Glide 10s slow-fall (hold Jump mid-air), Shield absorbs next hit.' },
        { icon: 'yarn_knot.png', title: 'Level 2 at 300 m',
          body: 'Past 300m the world storms: crimson palette, angry scowling yarn knots on the ground, and run speed ramps from 1.0× to 1.3× over the next 100m. Jump or lasso the knots.' },
        { icon: 'needle_icon.png', title: 'PC key bindings', keys: [
            ['Jump', 'Space / ↑ / W'],
            ['Lasso', 'L or F'],
            ['Double-jump orb', '1'],
            ['Slow-mo', '2'],
            ['Glider', '3'],
            ['Shield', '4'],
            ['Pause', 'P'],
            ['Help', 'H or ?'],
            ['Glider slow-fall', 'hold Jump while airborne'],
        ] },
        { icon: 'wefty_celebrate.png', title: 'Chase your best',
          body: 'Your best distance sticks across runs. At 750m a new game mode unlocks on the hub. Reopen this help anytime with the ? button — even while paused.' },
    ];
    let tutorialPage = 0;
    const tutorialEl = document.getElementById('tutorial');
    const tutIcon = document.getElementById('tut-icon');
    const tutTitle = document.getElementById('tut-title');
    const tutBody = document.getElementById('tut-body');
    const tutDots = document.getElementById('tut-dots');
    const tutBack = document.getElementById('tut-back');
    const tutNext = document.getElementById('tut-next');
    function renderTutorial() {
        const p = TUTORIAL[tutorialPage];
        tutIcon.src = p.icon;
        tutTitle.textContent = p.title;
        if (p.keys) {
            // Render a crisp two-column table, one command per line.
            tutBody.innerHTML = '';
            const table = document.createElement('div');
            table.className = 'tut-keys';
            for (const [label, combo] of p.keys) {
                const row = document.createElement('div');
                row.className = 'tut-key-row';
                row.innerHTML = `<span class="tut-key-label">${label}</span>` +
                                `<span class="tut-key-combo">${combo}</span>`;
                table.appendChild(row);
            }
            tutBody.appendChild(table);
        } else {
            tutBody.textContent = p.body;
        }
        tutDots.innerHTML = '';
        TUTORIAL.forEach((_, i) => {
            const d = document.createElement('span');
            d.className = 'tutorial-dot' + (i === tutorialPage ? ' active' : '');
            tutDots.appendChild(d);
        });
        tutBack.style.visibility = tutorialPage > 0 ? 'visible' : 'hidden';
        tutNext.textContent = tutorialPage < TUTORIAL.length - 1 ? 'Next' : "Let's go!";
    }
    function closeTutorial() {
        tutorialEl.classList.add('hidden');
        localStorage.setItem('wefty_run_tutorial_v3', '1');
        if (world.tutorialMode) {
            // Came from the demo mode — wipe and start a fresh run.
            world.tutorialMode = false;
            resetWorld();
        }
        // If the tutorial was opened while paused (help mid-run), leave
        // the world alone. Player can unpause to resume where they were.
    }
    function openTutorial(demo) {
        tutorialPage = 0;
        renderTutorial();
        tutorialEl.classList.remove('hidden');
        if (demo) {
            // Fresh first-time or cold restart — run the scripted demo
            // behind the panels. Hide any lingering game-over panel so
            // it doesn't bleed through the tutorial layout.
            const overlay = document.getElementById('game-over');
            if (overlay) overlay.classList.add('hidden');
            world.tutorialMode = true;
            resetWorld();
            world.tutorialMode = true;
        }
        // Otherwise (help mid-run / help while paused) we don't touch
        // the world so progress + pause state survive.
    }
    tutBack.addEventListener('click', () => { if (tutorialPage > 0) { tutorialPage--; renderTutorial(); } });
    tutNext.addEventListener('click', () => {
        if (tutorialPage < TUTORIAL.length - 1) { tutorialPage++; renderTutorial(); }
        else closeTutorial();
    });
    document.getElementById('tut-skip').addEventListener('click', closeTutorial);
    // Help button: show the tutorial panels. Start the scripted demo
    // unless the player is mid-run (not paused, not game-over) — in
    // that case we leave the world alone so their progress survives.
    document.getElementById('btn-help').addEventListener('click', () => {
        const midRun = !world.gameOver && !world.isPaused && world.distance > 0.5;
        openTutorial(!midRun);
    });
    if (!localStorage.getItem('wefty_run_tutorial_v3')) {
        openTutorial(true);
    } else {
        closeTutorial();
    }

    function resetWorld() {
        world.cameraX = 0;
        world.weftyY = PLATFORM_Y;
        world.weftyVy = 0;
        world.grounded = true;
        world.distance = 0;
        world.gameOver = false;
        world.biomeIndex = 0;
        world.lastMilestone = 0;
        world.isDrawing = false;
        world.platforms.length = 0;
        world.bridges.length = 0;
        world.hazards.length = 0;
        world.lastHazardAtX = -10;
        world.lastKnotAtX = -10;
        world.letters.length = 0;
        world.collectedLetters.clear();
        world.springs.length = 0;
        world.gliders.length = 0;
        world.doubleJumps.length = 0;
        world.slowMos.length = 0;
        world.shields.length = 0;
        world.hearts.length = 0;
        world.knots.length = 0;
        world.floatingPlatforms.length = 0;
        world.gliderUntil = 0;
        world.doubleJumpUntil = 0;
        world.doubleJumpAvailable = false;
        world.slowMoUntil = 0;
        world.shieldCharges = 0;
        world.invDoubleJump = 0;
        world.invSlowMo = 0;
        world.invGlider = 0;
        world.invShield = 0;
        world.jumpHeld = false;
        world.tutorialMode = false;
        world.shrinkUntil = 0;
        world.needles = 3;
        world.invincibleUntil = 0;
        world.events.length = 0;
        seedPlatforms();
    }

    function seedPlatforms() {
        // Short flat runway so height variance starts kicking in quickly.
        world.platforms.push({ xStart: -0.5, xEnd: 1.4, top: PLATFORM_Y });
        let x = 1.4;
        for (let i = 0; i < 3; i++) {
            const gap = Math.random() * 0.12 + 0.12;
            x += gap;
            const len = Math.random() * 0.5 + 0.55;
            world.platforms.push({ xStart: x, xEnd: x + len, top: PLATFORM_Y });
            x += len;
        }
    }
    seedPlatforms();

    function addNextPlatform() {
        const last = world.platforms[world.platforms.length - 1];
        const difficulty = Math.min(world.distance / 8, 1.5);
        // Raised floor so gaps start in "needs a bridge OR a jump"
        // territory, and the widest (~0.50) force a bridge + jump
        // combo. Storm biome nudges the floor further.
        const stormFloor = world.distance >= 30 ? 0.05 : 0;
        const gapMin = 0.22 + 0.08 * difficulty + stormFloor;
        const gapMax = Math.max(0.30 + 0.20 * difficulty, gapMin + 0.02);
        const gap = Math.random() * (gapMax - gapMin) + gapMin;
        const x = last.xEnd + gap;
        const len = Math.random() * 0.75 + 0.35;

        // Wider height swing so the terrain actually reads as rolling
        // hills rather than near-flat with a nudge.
        const sampled = PLATFORM_Y + (Math.random() * 0.54 - 0.32);
        const blended = last.top + (sampled - last.top) * 0.70;
        const top = Math.max(PLATFORM_Y - 0.36, Math.min(PLATFORM_Y + 0.24, blended));

        // Taller crown — up to 0.22 units so hills read as hills.
        const crownMax = 0.22 * Math.min(1, len / 1.10);
        const crown = 0.05 + Math.random() * crownMax;

        world.platforms.push({ xStart: x, xEnd: x + len, top, crown });

        // Scissors — storm biome bumps base rate + cap.
        const biome = currentBiome();
        const since = x - world.lastHazardAtX;
        const stormBoost = biome === 'STORM' ? 0.25 : 0;
        const stormCap = biome === 'STORM' ? 0.85 : 0.70;
        const chance = Math.min(stormCap, 0.30 + 0.30 * difficulty + stormBoost);
        const qualifies = world.distance > 1.5 && len > 0.45;
        const forced = since > 2.5 && qualifies;
        if (qualifies && (forced || Math.random() < chance)) {
            const hazardX = x + len * (0.30 + Math.random() * 0.40);
            const heightAbove = 0.06 + Math.random() * 0.04;
            // Offset from the actual hill surface at hazardX so it
            // sits above the crown, not buried inside it.
            const surfaceY = surfaceYAt(x, len, top, crown, hazardX);
            world.hazards.push({ worldX: hazardX, y: surfaceY - heightAbove, rot: Math.random() * 6.28 });
            world.lastHazardAtX = hazardX;
        }

        // Floor knots — Level 2 only. Spiky tangles on the platform
        // surface; jump or lasso them.
        if (biome === 'STORM' && len > 0.40) {
            const sinceKnot = x - (world.lastKnotAtX ?? -10);
            const forced = sinceKnot > 1.8;
            if (forced || Math.random() < 0.70) {
                const kx = x + len * (0.20 + Math.random() * 0.60);
                const ky = surfaceYAt(x, len, top, crown, kx) - 0.02;
                const clash = world.hazards.some(hz =>
                    Math.abs(hz.worldX - kx) < 0.10
                );
                if (!clash) {
                    world.knots.push({ worldX: kx, y: ky });
                    world.lastKnotAtX = kx;
                }
            }
        }

        // Staggered pickup spawner — at most one pickup per platform.
        // Distance gates introduce types gradually.
        if (len > 0.40) {
            const candidates = [];
            if (world.distance > 1)  candidates.push(['letter', 0.65]);
            if (world.distance > 5)  candidates.push(['spring', 0.18]);
            if (world.distance > 12) candidates.push(['djump',  0.10]);
            if (world.distance > 20) candidates.push(['slowmo', 0.09]);
            if (world.distance > 30) candidates.push(['glider', 0.10]);
            if (world.distance > 40) candidates.push(['shield', 0.09]);
            const total = candidates.reduce((s, c) => s + c[1], 0);
            if (candidates.length && Math.random() < total) {
                let roll = Math.random() * total;
                let picked = candidates[0][0];
                for (const [id, w] of candidates) {
                    if (roll <= w) { picked = id; break; }
                    roll -= w;
                }
                spawnPickup(picked, x, top, len, crown);
            }
        }

        // Floating reward platforms — small high-up ledges sprinkled
        // over gaps or near the main chain, each carrying a bonus.
        if (world.distance > 8 && Math.random() < 0.30) {
            const flen = 0.22 + Math.random() * 0.20;
            const fxStart = x + len * 0.20 + Math.random() * (len * 0.6 + 0.18);
            const ftop = PLATFORM_Y - (0.30 + Math.random() * 0.18);
            world.floatingPlatforms.push({ xStart: fxStart, xEnd: fxStart + flen, top: ftop });
            // Hearts only roll into the reward pool while Wefty actually
            // needs them (needles <= 3). Full at 5 → no banked freebies.
            const poolBase = ['letter', 'djump', 'slowmo', 'glider', 'shield'];
            const pool = world.needles <= 3 ? ['heart', 'heart', ...poolBase] : poolBase;
            const rewardKind = pool[Math.floor(Math.random() * pool.length)];
            const rx = fxStart + flen * 0.5;
            const ry = ftop - 0.05;
            if (rewardKind === 'heart') {
                world.hearts.push({ worldX: rx, y: ry, collected: false });
            } else if (rewardKind === 'letter') {
                const missing = 'WEFTY'.split('').filter(c => !world.collectedLetters.has(c));
                const pool2 = missing.length ? missing : ['W', 'E', 'F', 'T', 'Y'];
                world.letters.push({ worldX: rx, y: ry, letter: pool2[Math.floor(Math.random() * pool2.length)], collected: false });
            } else if (rewardKind === 'djump') {
                world.doubleJumps.push({ worldX: rx, y: ry, collected: false });
            } else if (rewardKind === 'slowmo') {
                world.slowMos.push({ worldX: rx, y: ry, collected: false });
            } else if (rewardKind === 'glider') {
                world.gliders.push({ worldX: rx, y: ry, collected: false });
            } else if (rewardKind === 'shield') {
                world.shields.push({ worldX: rx, y: ry, collected: false });
            }
        }
    }

    function spawnPickup(kind, x, top, len, crown) {
        const airborne = (minH, rangeH) => {
            for (let i = 0; i < 6; i++) {
                const px = x + len * (0.15 + Math.random() * 0.70);
                // Use the hill-curve surface so pickups float above tall
                // crowns instead of getting buried inside them.
                const surf = surfaceYAt(x, len, top, crown, px);
                const py = surf - (minH + Math.random() * rangeH);
                const clash = world.hazards.some(hz => {
                    const dx = hz.worldX - px, dy = hz.y - py;
                    return Math.sqrt(dx * dx + dy * dy) < 0.12;
                });
                if (!clash) return { px, py };
            }
            return null;
        };
        if (kind === 'letter') {
            const missing = 'WEFTY'.split('').filter(c => !world.collectedLetters.has(c));
            const pool = missing.length ? missing : ['W', 'E', 'F', 'T', 'Y'];
            const letter = pool[Math.floor(Math.random() * pool.length)];
            const p = airborne(0.12, 0.14); if (!p) return;
            world.letters.push({ worldX: p.px, y: p.py, letter, collected: false });
        } else if (kind === 'spring') {
            const sx = x + len * (0.25 + Math.random() * 0.50);
            const sy = surfaceYAt(x, len, top, crown, sx);
            if (world.hazards.some(hz => Math.abs(hz.worldX - sx) < 0.10)) return;
            world.springs.push({ worldX: sx, y: sy, consumed: false });
        } else if (kind === 'djump') {
            const p = airborne(0.18, 0.10); if (!p) return;
            world.doubleJumps.push({ worldX: p.px, y: p.py, collected: false });
        } else if (kind === 'slowmo') {
            const p = airborne(0.22, 0.10); if (!p) return;
            world.slowMos.push({ worldX: p.px, y: p.py, collected: false });
        } else if (kind === 'glider') {
            const p = airborne(0.32, 0.10); if (!p) return;
            world.gliders.push({ worldX: p.px, y: p.py, collected: false });
        } else if (kind === 'shield') {
            const p = airborne(0.24, 0.10); if (!p) return;
            world.shields.push({ worldX: p.px, y: p.py, collected: false });
        }
    }

    function jump() {
        if (world.gameOver) return;
        if (world.grounded) {
            world.weftyVy = -JUMP_VELOCITY;
            world.grounded = false;
            world.events.push('jump');
        } else if (world.doubleJumpUntil > performance.now() && world.doubleJumpAvailable) {
            world.weftyVy = -JUMP_VELOCITY;
            world.doubleJumpAvailable = false;
            world.events.push('jump');
        }
    }

    // Power-up activation — decrement inventory and kick off the timed
    // effect. Silently no-ops if already active, to avoid burning an
    // inventory item on a double-tap.
    function activateDoubleJump() {
        if (world.gameOver || world.invDoubleJump <= 0) return;
        if (world.doubleJumpUntil > performance.now()) return;
        world.invDoubleJump--;
        world.doubleJumpUntil = performance.now() + 12000;
        world.doubleJumpAvailable = true;
        world.events.push('double-jump');
    }
    function activateSlowMo() {
        if (world.gameOver || world.invSlowMo <= 0) return;
        if (world.slowMoUntil > performance.now()) return;
        world.invSlowMo--;
        world.slowMoUntil = performance.now() + 5000;
        world.events.push('slow-mo');
    }
    function activateGlider() {
        if (world.gameOver || world.invGlider <= 0) return;
        if (world.gliderUntil > performance.now()) return;
        world.invGlider--;
        world.gliderUntil = performance.now() + 10000;
        world.events.push('glider');
    }
    function activateShield() {
        if (world.gameOver || world.invShield <= 0) return;
        if (world.shieldCharges > 0) return;
        world.invShield--;
        world.shieldCharges = 1;
        world.events.push('shield');
    }

    const LASSO_RANGE = 0.35;
    const LASSO_COOLDOWN_TICKS = 90;
    const LASSO_FLASH_TICKS = 22;
    function fireLasso() {
        if (world.gameOver || world.isPaused) return false;
        if ((world.frameTick || 0) < world.lassoReadyAtTick) return false;
        const wx = world.cameraX + WEFTY_SCREEN_X;
        const wy = world.weftyY - 0.05;
        let best = null, bestD = Infinity;
        for (const hz of world.hazards) {
            if (hz.worldX < wx - 0.05) continue;
            const dx = hz.worldX - wx, dy = hz.y - wy;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < LASSO_RANGE && d < bestD) { best = hz; bestD = d; }
        }
        world.lassoReadyAtTick = (world.frameTick || 0) + LASSO_COOLDOWN_TICKS;
        world.lassoFlashUntilTick = (world.frameTick || 0) + LASSO_FLASH_TICKS;
        if (best) {
            world.lassoLastHitX = best.worldX;
            world.lassoLastHitY = best.y;
            world.lassoHit = true;
            const idx = world.hazards.indexOf(best);
            if (idx >= 0) world.hazards.splice(idx, 1);
            world.events.push('lasso');
            return true;
        }
        // Miss: still show the rope flying forward so the player sees
        // the attack animation.
        world.lassoLastHitX = wx + LASSO_RANGE * 0.9;
        world.lassoLastHitY = wy - 0.05;
        world.lassoHit = false;
        return false;
    }

    // Y at which a platform's surface sits at a given world X. Edges
    // flat (t=0 and t=1 → sin=0), middle bulges up by `crown`.
    function platformSurfaceY(p, worldX) {
        if (!p.crown) return p.top;
        const t = Math.max(0, Math.min(1, (worldX - p.xStart) / (p.xEnd - p.xStart)));
        return p.top - p.crown * Math.sin(Math.PI * t);
    }
    function surfaceYAt(x, len, top, crown, worldX) {
        if (!crown) return top;
        const t = Math.max(0, Math.min(1, (worldX - x) / len));
        return top - crown * Math.sin(Math.PI * t);
    }

    function supportYAt(worldX, feetY) {
        const candidates = [];
        for (const p of world.platforms) {
            if (worldX >= p.xStart && worldX <= p.xEnd) candidates.push(platformSurfaceY(p, worldX));
        }
        for (const f of world.floatingPlatforms || []) {
            if (worldX >= f.xStart && worldX <= f.xEnd) candidates.push(f.top);
        }
        for (const b of world.bridges) {
            if (!b.valid) continue;
            for (let i = 0; i < b.pts.length - 1; i++) {
                const [x1, y1] = b.pts[i];
                const [x2, y2] = b.pts[i + 1];
                const lo = Math.min(x1, x2), hi = Math.max(x1, x2);
                if (worldX >= lo && worldX <= hi) {
                    const t = hi === lo ? 0 : (worldX - x1) / (x2 - x1);
                    candidates.push(y1 + (y2 - y1) * t);
                }
            }
        }
        if (candidates.length === 0) return null;
        // Pick the highest surface (smallest Y) that Wefty's feet have
        // reached so she doesn't magnetize up to a floating platform
        // above her.
        let best = null;
        for (const c of candidates) {
            if (feetY === undefined || c >= feetY - 0.02) {
                if (best === null || c < best) best = c;
            }
        }
        if (best !== null) return best;
        return Math.max.apply(null, candidates);
    }

    const MAX_STROKE_SPAN = 1 / 3;
    function capStrokeSpan(pts) {
        const startX = pts[0][0];
        const out = [pts[0]];
        for (let i = 1; i < pts.length; i++) {
            const [px, py] = pts[i];
            if (Math.abs(px - startX) > MAX_STROKE_SPAN) {
                const [lx, ly] = out[out.length - 1];
                const dx = px - lx;
                if (dx === 0) break;
                const allowed = MAX_STROKE_SPAN - Math.abs(lx - startX);
                if (allowed <= 0) break;
                const step = allowed * Math.sign(dx);
                const t = step / dx;
                out.push([lx + step, ly + (py - ly) * t]);
                break;
            }
            out.push([px, py]);
        }
        return out;
    }

    function addStroke(worldPts) {
        if (world.gameOver || worldPts.length < 2) return;
        // Capped at 1/3 of the viewport so the widest (~0.50) gaps demand
        // a bridge + jump combo. Anti-cheese: a new stroke evicts any
        // bridges that sit entirely ahead of Wefty (so the player can't
        // stack three 33% strokes into a ladder), but keeps ones she's
        // currently on or has already crossed.
        const capped = capStrokeSpan(worldPts);
        if (capped.length < 2) return;
        const weftyWX = world.cameraX + WEFTY_SCREEN_X;
        world.bridges = world.bridges.filter(b =>
            b.pts.some(([x]) => x <= weftyWX + 0.05)
        );
        world.bridges.push({ pts: capped, valid: true, ttl: Infinity });
        world.events.push('bridge-valid');
    }

    function step(dt) {
        if (world.gameOver || world.isPaused) return;
        world.frameTick = (world.frameTick || 0) + 1;
        // Stacked slow-mo: 0.2x while drawing bridges, 0.5x during the
        // slow-mo power-up window. Storm biome adds a +20% speed boost.
        const nowTick = performance.now();
        const drawMult = world.isDrawing ? 0.20 : 1;
        const slowMult = world.slowMoUntil > nowTick ? 0.50 : 1;
        const effDt = dt * drawMult * slowMult;
        const biome = currentBiome();
        // Storm speed ramp — see WeftyRunWorld.kt for the shape.
        const stormDist = Math.max(0, world.distance - 30);
        let speedMult;
        if (world.distance < 30)      speedMult = 1;
        else if (stormDist < 5)       speedMult = 1 + 0.20 * (stormDist / 5);
        else                          speedMult = Math.min(1.30, 1.20 + 0.10 * ((stormDist - 5) / 5));
        world.cameraX += RUN_SPEED * speedMult * effDt;
        // Tutorial mode previews the game but shouldn't count distance
        // toward the best-score or trigger milestone/biome unlocks.
        if (!world.tutorialMode) world.distance = world.cameraX;

        // Decay bridges
        for (let i = world.bridges.length - 1; i >= 0; i--) {
            const b = world.bridges[i];
            if (!b.valid) {
                b.ttl -= dt;
                if (b.ttl <= 0) world.bridges.splice(i, 1);
            } else if (b.pts[b.pts.length - 1][0] < world.cameraX - 0.2) {
                world.bridges.splice(i, 1);
            }
        }

        // Procedurally add platforms ahead
        while (world.platforms[world.platforms.length - 1].xEnd < world.cameraX + 4) {
            addNextPlatform();
        }

        // Rotate + reap hazards
        for (let i = world.hazards.length - 1; i >= 0; i--) {
            const hz = world.hazards[i];
            hz.rot += dt * 2.4;
            if (hz.worldX < world.cameraX - 0.5) world.hazards.splice(i, 1);
        }

        // Hazard collision — circle vs circle. Shrink mode → smaller
        // hitbox. I-frames skip collision briefly after a hit.
        const wcx = world.cameraX + WEFTY_SCREEN_X;
        const wcy = world.weftyY - 0.05;
        const now = performance.now();
        const bodyR = (world.shrinkUntil > now) ? 0.018 : 0.035;
        if (now > world.invincibleUntil) {
            let hit = false;
            for (const hz of world.hazards) {
                const dx = hz.worldX - wcx, dy = hz.y - wcy;
                if (Math.sqrt(dx * dx + dy * dy) < HAZARD_RADIUS + bodyR) { hit = true; break; }
            }
            // Floor knots — grounded collision only.
            if (!hit && world.grounded) {
                for (const k of world.knots) {
                    if (Math.abs(k.worldX - wcx) < 0.06 &&
                        Math.abs(k.y - world.weftyY) < 0.06) { hit = true; break; }
                }
            }
            if (hit) {
                if (world.tutorialMode) {
                    // Demo mode — cosmetic i-frames only, no damage.
                    world.invincibleUntil = now + 1400;
                } else if (world.shieldCharges > 0) {
                    world.shieldCharges--;
                    world.events.push('shield-broken');
                    world.invincibleUntil = now + 1400;
                } else {
                    world.needles--;
                    world.events.push('hazard-hit');
                    if (world.needles <= 0) {
                        world.gameOver = true;
                        world.events.push('game-over');
                    } else {
                        world.invincibleUntil = now + 1400;
                    }
                }
            }
        }

        // Letter collection — fly-through pickup
        for (let i = world.letters.length - 1; i >= 0; i--) {
            const lt = world.letters[i];
            if (lt.worldX < world.cameraX - 0.5) { world.letters.splice(i, 1); continue; }
            if (lt.collected) continue;
            const dx = lt.worldX - wcx;
            const dy = lt.y - wcy;
            if (Math.sqrt(dx * dx + dy * dy) < 0.055) {
                lt.collected = true;
                world.collectedLetters.add(lt.letter);
                world.events.push('letter');
                if (world.collectedLetters.size === 5) {
                    // Full WEFTY word — grant shrink mode for 18s.
                    world.shrinkUntil = performance.now() + 18000;
                    world.collectedLetters.clear();
                    world.events.push('power-up');
                }
            }
        }

        // Glider pickup — adds to inventory.
        for (let i = world.gliders.length - 1; i >= 0; i--) {
            const g = world.gliders[i];
            if (g.worldX < world.cameraX - 0.5) { world.gliders.splice(i, 1); continue; }
            if (g.collected) continue;
            const dx = g.worldX - wcx;
            const dy = g.y - wcy;
            if (Math.sqrt(dx * dx + dy * dy) < 0.065) {
                g.collected = true;
                world.invGlider++;
                world.events.push('pickup');
            }
        }

        // Double-jump pickup — adds to inventory.
        for (let i = world.doubleJumps.length - 1; i >= 0; i--) {
            const dj = world.doubleJumps[i];
            if (dj.worldX < world.cameraX - 0.5) { world.doubleJumps.splice(i, 1); continue; }
            if (dj.collected) continue;
            const dx = dj.worldX - wcx, dy = dj.y - wcy;
            if (Math.sqrt(dx * dx + dy * dy) < 0.065) {
                dj.collected = true;
                world.invDoubleJump++;
                world.events.push('pickup');
            }
        }

        // Slow-mo pickup — adds to inventory.
        for (let i = world.slowMos.length - 1; i >= 0; i--) {
            const s = world.slowMos[i];
            if (s.worldX < world.cameraX - 0.5) { world.slowMos.splice(i, 1); continue; }
            if (s.collected) continue;
            const dx = s.worldX - wcx, dy = s.y - wcy;
            if (Math.sqrt(dx * dx + dy * dy) < 0.065) {
                s.collected = true;
                world.invSlowMo++;
                world.events.push('pickup');
            }
        }

        // Shield pickup — adds to inventory.
        for (let i = world.shields.length - 1; i >= 0; i--) {
            const s = world.shields[i];
            if (s.worldX < world.cameraX - 0.5) { world.shields.splice(i, 1); continue; }
            if (s.collected) continue;
            const dx = s.worldX - wcx, dy = s.y - wcy;
            if (Math.sqrt(dx * dx + dy * dy) < 0.065) {
                s.collected = true;
                world.invShield++;
                world.events.push('pickup');
            }
        }

        // Heart pickup — immediate +1 needle, capped at MAX_NEEDLES.
        for (let i = world.hearts.length - 1; i >= 0; i--) {
            const hrt = world.hearts[i];
            if (hrt.worldX < world.cameraX - 0.5) { world.hearts.splice(i, 1); continue; }
            if (hrt.collected) continue;
            const dx = hrt.worldX - wcx, dy = hrt.y - wcy;
            if (Math.sqrt(dx * dx + dy * dy) < 0.07) {
                hrt.collected = true;
                if (world.needles < 5) world.needles++;
                world.events.push('heart');
            }
        }

        // Drop floating platforms that have scrolled off-screen.
        world.floatingPlatforms = world.floatingPlatforms.filter(f => f.xEnd >= world.cameraX - 0.5);

        // Physics
        const weftyWorldX = world.cameraX + WEFTY_SCREEN_X;
        const support = supportYAt(weftyWorldX, world.weftyY);
        // Ground-follow rules:
        //  (a) walking terrain — snap feet to a slightly-lower surface
        //      (hill downslope). Capped at SLOPE_STICK_MAX so a tall
        //      ramp edge lets her fall instead of teleporting down.
        //  (b) landing from an arc — feet reached support.
        // Both require vy >= 0 so an active jump still reads airborne.
        const drop = support !== null ? support - world.weftyY : 0;
        const SLOPE_STICK_MAX = 0.045;
        const followingGround = support !== null && world.weftyVy >= 0 && (
            (world.grounded && drop <= SLOPE_STICK_MAX) ||
            world.weftyY >= support - 0.001
        );
        if (followingGround) {
            world.weftyY = support;
            world.weftyVy = 0;
            world.grounded = true;
            if (world.doubleJumpUntil > performance.now()) world.doubleJumpAvailable = true;
        } else {
            world.grounded = false;
            // Use slo-mo'd delta so gravity slows too — otherwise mid-
            // jump drawing plummets Wefty into whatever she was about
            // to clear. Glider mode: while active and falling with the
            // jump input held, cut gravity to 25% and cap descent speed.
            const gliderActive = world.gliderUntil > performance.now() &&
                                 world.jumpHeld && world.weftyVy >= 0;
            const g = gliderActive ? GRAVITY * 0.25 : GRAVITY;
            world.weftyVy += g * effDt;
            if (gliderActive) world.weftyVy = Math.min(world.weftyVy, 0.35);
            world.weftyY += world.weftyVy * effDt;
            if (support !== null && world.weftyY >= support) {
                world.weftyY = support;
                world.weftyVy = 0;
                world.grounded = true;
                if (world.doubleJumpUntil > performance.now()) world.doubleJumpAvailable = true;
            }
        }

        // Spring pad contact — only fires when Wefty is on the ground
        // near the pad's X. Consume and launch.
        if (world.grounded) {
            for (let i = world.springs.length - 1; i >= 0; i--) {
                const s = world.springs[i];
                if (s.worldX < world.cameraX - 0.5) { world.springs.splice(i, 1); continue; }
                if (s.consumed) continue;
                if (Math.abs(s.worldX - weftyWorldX) < 0.055 &&
                    Math.abs(s.y - world.weftyY) < 0.06) {
                    s.consumed = true;
                    world.weftyVy = -JUMP_VELOCITY * 1.55;
                    world.grounded = false;
                    world.events.push('spring');
                }
            }
        }
        // Milestones — one per world-distance unit
        const m = Math.floor(world.distance);
        if (m > world.lastMilestone) {
            world.lastMilestone = m;
            world.biomeIndex++;
            world.events.push('milestone');
            // Biome transition banner fires once when crossing 300m.
            if (m === 30) world.events.push('biome-storm');
            // 300m unlock (30 world-units) — fire once.
            if (m >= 30 && !localStorage.getItem('wefty_run_level2_unlocked')) {
                world.events.push('milestone-500');
            }
            // 750m unlock (75 world-units) — level 3 (Wefty Climb) stub.
            if (m >= 75 && !localStorage.getItem('wefty_run_level3_unlocked')) {
                world.events.push('milestone-1500');
            }
        }

        if (world.weftyY > DEATH_Y && !world.gameOver) {
            if (world.tutorialMode) {
                // Teleport her back to a safe platform so the demo keeps
                // looping instead of ending.
                const lastPlat = world.platforms[world.platforms.length - 1];
                world.weftyY = (lastPlat ? lastPlat.top : PLATFORM_Y) - 0.02;
                world.weftyVy = 0;
                world.grounded = true;
            } else {
                world.gameOver = true;
                world.events.push('game-over');
            }
        }
    }

    function drainEvents() {
        while (world.events.length > 0) {
            const e = world.events.shift();
            const hasSound = (typeof Sound !== 'undefined');
            if (e === 'bridge-valid')   hasSound && Sound.playWordSubmit();
            else if (e === 'milestone') hasSound && Sound.playTurnChange();
            else if (e === 'jump')      hasSound && Sound.playClick();
            else if (e === 'hazard-hit') hasSound && Sound.playTimerWarning();
            else if (e === 'letter')    hasSound && Sound.playClick();
            else if (e === 'lasso')     hasSound && Sound.playWordSubmit();
            else if (e === 'spring')    hasSound && Sound.playTurnChange();
            else if (e === 'glider')    { hasSound && Sound.playGameStart(); musicPower.currentTime = 0; musicPower.play().catch(() => {}); }
            else if (e === 'double-jump') { hasSound && Sound.playGameStart(); musicPower.currentTime = 0; musicPower.play().catch(() => {}); }
            else if (e === 'slow-mo')     { hasSound && Sound.playGameStart(); musicPower.currentTime = 0; musicPower.play().catch(() => {}); }
            else if (e === 'shield')      { hasSound && Sound.playGameStart(); musicPower.currentTime = 0; musicPower.play().catch(() => {}); }
            else if (e === 'shield-broken') hasSound && Sound.playTimerWarning();
            else if (e === 'pickup') hasSound && Sound.playClick();
            else if (e === 'heart')  hasSound && Sound.playGameStart();
            else if (e === 'biome-storm') {
                hasSound && Sound.playGameStart();
                const banner = document.getElementById('storm-banner');
                banner.classList.remove('hidden');
                setTimeout(() => banner.classList.add('hidden'), 2500);
            }
            else if (e === 'milestone-1500') {
                hasSound && Sound.playGameStart();
                localStorage.setItem('wefty_run_level3_unlocked', '1');
                const t = document.getElementById('unlock-toast');
                if (t) {
                    t.textContent = '🎉 Level 3 unlocked — Wefty Climb coming soon!';
                    t.classList.remove('hidden');
                    setTimeout(() => t.classList.add('hidden'), 3000);
                }
            }
            else if (e === 'milestone-500') {
                hasSound && Sound.playGameStart();
                localStorage.setItem('wefty_run_level2_unlocked', '1');
                const t = document.getElementById('unlock-toast');
                t.classList.remove('hidden');
                setTimeout(() => t.classList.add('hidden'), 3000);
            }
            else if (e === 'power-up')  { hasSound && Sound.playGameStart(); musicPower.currentTime = 0; musicPower.play().catch(() => {}); }
            else if (e === 'game-over') {
                hasSound && Sound.playGameEnd();
                try { musicLoop.pause(); } catch (_) {}
                musicOver.currentTime = 0;
                musicOver.play().catch(() => {});
                const score = Math.round(world.distance * 10);
                if (score > bestDistance) {
                    bestDistance = score;
                    localStorage.setItem('wefty_run_best', String(score));
                    // Publish the new personal best to the global
                    // Wefty Run leaderboard. Fire-and-forget; auth/db
                    // may not be ready (e.g., offline) and that's OK.
                    try {
                        if (typeof Auth !== 'undefined' && Auth.uid && !Auth.isAnonymous) {
                            firebase.database().ref('wefty_run_leaderboard/' + Auth.uid).set({
                                uid: Auth.uid,
                                displayName: Auth.name || 'Player',
                                avatar: Auth.avatar || '',
                                bestDistance: score,
                                updatedAt: firebase.database.ServerValue.TIMESTAMP,
                            });
                        }
                    } catch (_) {}
                }
                const runTs = recordRun(score);
                renderScoreboard(runTs);
            }
        }
    }

    // ── Canvas setup ───────────────────────────────────────────────────
    const bg = document.getElementById('bg');
    const fg = document.getElementById('fg');
    const bgCtx = bg.getContext('2d');
    const fgCtx = fg.getContext('2d');

    function fit() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        for (const c of [bg, fg]) {
            c.width = Math.round(window.innerWidth * dpr);
            c.height = Math.round(window.innerHeight * dpr);
            c.style.width = window.innerWidth + 'px';
            c.style.height = window.innerHeight + 'px';
            c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
        }
    }
    window.addEventListener('resize', () => fit());
    fit();

    let yarnPattern = null;
    WeftyThread.loadYarnPattern(bgCtx, 'yarn_texture.png', (p) => { yarnPattern = p; });

    // Wefty sprites — 2-frame run cycle + fall pose + parallax bg.
    function loadImg(src) {
        const img = new Image();
        img.src = src;
        return img;
    }
    const weftyRunA = loadImg('wefty_run_a.png');
    const weftyRunB = loadImg('wefty_run_b.png');
    const weftyFall = loadImg('wefty_fall.png');
    const parallaxImg = loadImg('parallax_bg.png');
    const scissorsImg = loadImg('scissors_hazard.png');
    const scissorsOpenImg = loadImg('scissors_open.png');
    const scissorsClosedImg = loadImg('scissors_closed.png');
    const needleImg = loadImg('needle_icon.png');
    const springImg = loadImg('spring_pad.png');
    const gliderImg = loadImg('glider_kite.png');
    const djImg = loadImg('double_jump.png');
    const slowMoImg = loadImg('slowmo_yarn.png');
    const shieldImg = loadImg('yarn_shield.png');
    const knotImg = loadImg('yarn_knot.png');

    // ── Music ──────────────────────────────────────────────────────────
    const musicLoop = new Audio('wefty_run_loop.mp3');
    musicLoop.loop = true;
    musicLoop.volume = 0.35;
    musicLoop.preload = 'auto';
    const musicOver = new Audio('wefty_game_over.mp3');
    musicOver.volume = 0.55;
    const musicPower = new Audio('wefty_powerup.mp3');
    musicPower.volume = 0.55;
    // Autoplay policy: can't start until the user gestures once.
    let musicStarted = false;
    function startMusic() {
        if (musicStarted) return;
        musicStarted = true;
        musicLoop.play().catch(() => { musicStarted = false; });
