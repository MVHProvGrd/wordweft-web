<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Wefty — Top Scores</title>
<style>
    :root {
        --bg-0: #0F0F23;
        --bg-1: #1A1A2E;
        --muted: #A0A0B8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
        min-height: 100vh;
        padding: 24px 20px 40px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    header a.back { color: var(--muted); text-decoration: none; font-size: 14px; }
    header h1 { font-size: 22px; margin: 0; flex: 1; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }
    .tab.active {
        background: rgba(251, 191, 36, 0.12);
        border-color: rgba(251, 191, 36, 0.5);
        color: #FBBF24;
    }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .row {
        display: grid;
        grid-template-columns: 48px 1fr auto;
        align-items: center;
        column-gap: 12px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #15152B;
        margin-bottom: 6px;
    }
    .row.me   { background: #1E1E36; border: 1px solid rgba(251, 191, 36, 0.4); }
    .rank     { color: #888; font-weight: 700; font-size: 14px; text-align: right; }
    .rank.g1  { color: #FBBF24; }
    .rank.g2  { color: #C0C0C0; }
    .rank.g3  { color: #CD7F32; }
    .name     { color: #fff; font-size: 14px; }
    .name .avatar { margin-right: 6px; }
    .me-tag   { color: #FBBF24; font-size: 11px; margin-left: 6px; font-weight: 700; }
    .dist     { color: #fff; font-weight: 700; font-size: 15px; font-family: ui-monospace, monospace; }
    .empty, .loading {
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        padding: 40px 0;
    }
</style>
</head>
<body>
<div class="wrap">
    <header>
        <a class="back" href="wefty-hub.html">← Hub</a>
        <h1 id="page-title">Top Scores 🏆</h1>
    </header>
    <div class="tabs" role="tablist">
        <button class="tab active" data-mode="run"   role="tab" aria-selected="true">Wefty Run</button>
        <button class="tab"        data-mode="climb" role="tab" aria-selected="false">Wefty Climb</button>
    </div>
    <div class="sub" id="sub">Personal bests from every Wefty Run player worldwide.</div>
    <div id="board" class="loading">Loading…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script>
(() => {
    const board = document.getElementById('board');
    const subEl = document.getElementById('sub');
    const titleEl = document.getElementById('page-title');

    // Kick off both boards' fetches in parallel so switching tabs is
    // instant after the initial load. Each tab is public-read.
    const runPromise   = firebase.database().ref('wefty_run_leaderboard').get();
    const climbPromise = firebase.database().ref('wefty_climb_leaderboard').get();

    async function resolveMyUid() {
        if (typeof Auth === 'undefined') return null;
        try {
            await Promise.race([
                (async () => { await Auth.init(); await Auth.ensureSignedIn(); })(),
                new Promise((_, r) => setTimeout(() => r(new Error('auth-timeout')), 2500)),
            ]);
            return Auth.uid || null;
        } catch (_) { return null; }
    }
    const myUidPromise = resolveMyUid();

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    async function render(mode) {
        board.className = 'loading';
        board.textContent = 'Loading…';
        titleEl.textContent = mode === 'run' ? 'Top Runs 🏆' : 'Top Climbs 🏔️';
        subEl.textContent = mode === 'run'
            ? 'Personal bests from every Wefty Run player worldwide.'
            : 'Personal bests from every Wefty Climb player worldwide.';
        const myUid = await myUidPromise;
        try {
            const snap = await (mode === 'run' ? runPromise : climbPromise);
            const valueKey = mode === 'run' ? 'bestDistance' : 'bestHeight';
            const entries = [];
            snap.forEach(child => {
                const v = child.val() || {};
                if (typeof v[valueKey] !== 'number' || !v.displayName) return;
                entries.push({
                    uid: child.key,
                    displayName: v.displayName,
                    avatar: v.avatar || '',
                    value: v[valueKey],
                });
            });
            entries.sort((a, b) => b.value - a.value);
            const top = entries.slice(0, 50);
            if (top.length === 0) {
                board.className = 'empty';
                board.textContent = mode === 'run'
                    ? 'No runs yet. Be the first — head back and play!'
                    : 'No climbs yet. Be the first — head back and play!';
                return;
            }
            board.className = '';
            board.innerHTML = '';
            top.forEach((e, i) => {
                const rank = i + 1;
                const isMe = myUid && e.uid === myUid;
                const rankClass = rank === 1 ? 'g1' : rank === 2 ? 'g2' : rank === 3 ? 'g3' : '';
                const row = document.createElement('div');
                row.className = 'row' + (isMe ? ' me' : '');
                row.innerHTML =
                    `<div class="rank ${rankClass}">#${rank}</div>` +
                    `<div class="name">` +
                        (e.avatar ? `<span class="avatar">${e.avatar}</span>` : '') +
                        escapeHtml(e.displayName) +
                        (isMe ? `<span class="me-tag">YOU</span>` : '') +
                    `</div>` +
                    `<div class="dist">${e.value} m</div>`;
                board.appendChild(row);
            });
        } catch (e) {
            board.className = 'empty';
            board.textContent = 'Couldn\'t load scores — ' + (e && e.message ? e.message : 'try again later.');
        }
    }

    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => {
                const active = t === btn;
                t.classList.toggle('active', active);
                t.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            render(btn.dataset.mode);
        });
    });

    render('run');
})();
</script>
</body>
</html>
