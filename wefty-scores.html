<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Wefty — Top Runs</title>
<link rel="stylesheet" href="ww2-tokens.css">
<link rel="stylesheet" href="ww2-polish.css">
<style>
    @font-face {
        font-family: 'Fraunces';
        src: url('fraunces.ttf') format('truetype-variations');
        font-weight: 100 900; font-style: normal; font-display: swap;
    }
    @font-face {
        font-family: 'Nunito';
        src: url('nunito.ttf') format('truetype-variations');
        font-weight: 200 900; font-style: normal; font-display: swap;
    }
    @font-face {
        font-family: 'JetBrains Mono';
        src: url('jetbrains_mono.ttf') format('truetype-variations');
        font-weight: 100 800; font-style: normal; font-display: swap;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
        font-family: var(--ww-body);
        color: var(--ww-ink-0);
        background: var(--ww-bg-0);
        background-image: var(--ww-surface-glow);
        min-height: 100vh;
        padding: 20px 18px 48px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    header a.back {
        color: var(--ww-ink-2);
        text-decoration: none;
        font-size: 13px;
        display: inline-flex; align-items: center; gap: 4px;
        padding: 6px 10px;
        border-radius: 10px;
        transition: background 0.15s, color 0.15s;
    }
    header a.back:hover { background: var(--ww-hair); color: var(--ww-ink-1); }

    .eyebrow-row { margin: 4px 0 2px; }
    .page-title {
        font-family: var(--ww-display);
        font-weight: 800;
        font-size: 28px;
        letter-spacing: -0.02em;
        margin: 0 0 14px;
        color: var(--ww-ink-0);
    }
    .sub {
        color: var(--ww-ink-2);
        font-size: 13px;
        margin-bottom: 18px;
    }

    /* ── Segmented tabs ───────────────────────────────────── */
    .tabs {
        display: flex;
        gap: 4px;
        padding: 4px;
        background: var(--ww-bg-2);
        border: 1px solid var(--ww-hair-2);
        border-radius: 999px;
        margin-bottom: 20px;
    }
    .tab {
        flex: 1;
        padding: 10px 14px;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--ww-ink-2);
        font-family: var(--ww-body);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
    }
    .tab:hover { color: var(--ww-ink-1); }
    .tab.active {
        background: var(--ww-violet-400);
        color: #fff;
        box-shadow: 0 4px 14px rgba(124,111,232,0.4);
    }

    /* ── Podium (top 3) ───────────────────────────────────── */
    .podium {
        display: grid;
        grid-template-columns: 1fr 1.2fr 1fr;
        gap: 8px;
        align-items: end;
        margin-bottom: 16px;
    }
    .podium-slot {
        background: var(--ww-bg-2);
        border: 1px solid var(--ww-hair-2);
        border-radius: 16px;
        padding: 14px 10px 16px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }
    .podium-slot .crown {
        font-size: 22px;
        line-height: 1;
        margin-bottom: 4px;
    }
    .podium-slot .avatar {
        font-size: 28px;
        margin: 4px 0 6px;
    }
    .podium-slot .p-name {
        font-family: var(--ww-display);
        font-weight: 800;
        font-size: 13px;
        color: var(--ww-ink-0);
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .podium-slot .p-score {
        font-family: var(--ww-mono);
        font-weight: 700;
        font-size: 13px;
        margin-top: 4px;
        letter-spacing: 0.02em;
    }
    .podium-slot.p1 {
        background: linear-gradient(180deg,
            color-mix(in oklab, var(--ww-gold) 22%, var(--ww-bg-2)) 0%,
            var(--ww-bg-2) 100%);
        border-color: color-mix(in oklab, var(--ww-gold) 55%, transparent);
        box-shadow: 0 0 24px rgba(232,166,62,0.25);
    }
    .podium-slot.p1 .p-score { color: var(--ww-gold); }
    .podium-slot.p2 {
        border-color: color-mix(in oklab, #C7B8E8 45%, transparent);
    }
    .podium-slot.p2 .p-score { color: var(--ww-ink-1); }
    .podium-slot.p3 {
        border-color: color-mix(in oklab, var(--ww-coral) 45%, transparent);
    }
    .podium-slot.p3 .p-score { color: var(--ww-coral); }
    .podium-slot.me {
        outline: 2px solid var(--ww-violet-400);
        outline-offset: 2px;
    }

    /* ── Regular rows (rank 4+) ───────────────────────────── */
    .row {
        display: grid;
        grid-template-columns: 44px 1fr auto;
        align-items: center;
        column-gap: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--ww-bg-2);
        border: 1px solid var(--ww-hair-2);
        margin-bottom: 6px;
        transition: background 0.15s, border-color 0.15s;
    }
    .row:hover { background: var(--ww-bg-3); }
    .row.me {
        background: color-mix(in oklab, var(--ww-violet-400) 12%, var(--ww-bg-2));
        border-color: var(--ww-violet-400);
        box-shadow: 0 0 0 1px var(--ww-violet-400) inset, 0 6px 18px rgba(124,111,232,0.25);
    }
    .rank {
        color: var(--ww-ink-3);
        font-weight: 800;
        font-size: 13px;
        font-family: var(--ww-mono);
        text-align: right;
        letter-spacing: 0.04em;
    }
    .name {
        color: var(--ww-ink-0);
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .name .avatar { font-size: 18px; }
    .me-tag {
        font-family: var(--ww-body);
        color: var(--ww-violet-200);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 2px 8px;
        background: color-mix(in oklab, var(--ww-violet-400) 20%, transparent);
        border-radius: 100px;
        margin-left: 6px;
    }
    .dist {
        font-family: var(--ww-mono);
        font-weight: 700;
        font-size: 14px;
        color: var(--ww-ink-0);
        letter-spacing: 0.02em;
    }
    .empty, .loading {
        color: var(--ww-ink-2);
        font-size: 14px;
        text-align: center;
        padding: 40px 0;
    }
</style>
</head>
<body>
<div class="wrap">
    <header>
        <a class="back" href="wefty-hub.html">← Hub</a>
    </header>
    <div class="eyebrow-row"><span class="ww-eyebrow">Leaderboards · Wefty</span></div>
    <h1 class="page-title" id="page-title">Top Runs 🏆</h1>

    <div class="tabs" role="tablist">
        <button class="tab active" data-mode="run"   role="tab" aria-selected="true">Wefty Run</button>
        <button class="tab"        data-mode="climb" role="tab" aria-selected="false">Wefty Climb</button>
    </div>
    <div class="sub" id="sub">Personal bests from every Wefty Run player worldwide.</div>
    <div id="board" class="loading">Loading…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script>
(() => {
    const board = document.getElementById('board');
    const subEl = document.getElementById('sub');
    const titleEl = document.getElementById('page-title');

    const runPromise   = firebase.database().ref('wefty_run_leaderboard').get();
    const climbPromise = firebase.database().ref('wefty_climb_leaderboard').get();

    async function resolveMyUid() {
        if (typeof Auth === 'undefined') return null;
        try {
            await Promise.race([
                (async () => { await Auth.init(); await Auth.ensureSignedIn(); })(),
                new Promise((_, r) => setTimeout(() => r(new Error('auth-timeout')), 2500)),
            ]);
            return Auth.uid || null;
        } catch (_) { return null; }
    }
    const myUidPromise = resolveMyUid();

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function podiumHtml(entries, myUid) {
        // Podium visual order: #2 | #1 | #3 so first place sits in
        // the middle like a real podium. Empty slots render as
        // placeholder cards so the grid stays stable on small lists.
        const byRank = { 1: entries[0], 2: entries[1], 3: entries[2] };
        const order = [2, 1, 3];
        const crowns = { 1: '🥇', 2: '🥈', 3: '🥉' };
        return order.map(rank => {
            const e = byRank[rank];
            if (!e) return `<div class="podium-slot p${rank}"><div class="crown">${crowns[rank]}</div><div class="p-name" style="opacity:0.35">—</div></div>`;
            const isMe = myUid && e.uid === myUid;
            return (
                `<div class="podium-slot p${rank}${isMe ? ' me' : ''}">` +
                    `<div class="crown">${crowns[rank]}</div>` +
                    (e.avatar ? `<div class="avatar">${e.avatar}</div>` : '<div class="avatar">🙂</div>') +
                    `<div class="p-name">${escapeHtml(e.displayName)}</div>` +
                    `<div class="p-score">${e.value} m</div>` +
                `</div>`
            );
        }).join('');
    }

    async function render(mode) {
        board.className = 'loading';
        board.textContent = 'Loading…';
        titleEl.textContent = mode === 'run' ? 'Top Runs 🏆' : 'Top Climbs 🏔️';
        subEl.textContent = mode === 'run'
            ? 'Personal bests from every Wefty Run player worldwide.'
            : 'Personal bests from every Wefty Climb player worldwide.';
        const myUid = await myUidPromise;
        try {
            const snap = await (mode === 'run' ? runPromise : climbPromise);
            const valueKey = mode === 'run' ? 'bestDistance' : 'bestHeight';
            const entries = [];
            snap.forEach(child => {
                const v = child.val() || {};
                if (typeof v[valueKey] !== 'number' || !v.displayName) return;
                entries.push({
                    uid: child.key,
                    displayName: v.displayName,
                    avatar: v.avatar || '',
                    value: v[valueKey],
                });
            });
            entries.sort((a, b) => b.value - a.value);
            const top = entries.slice(0, 50);
            if (top.length === 0) {
                board.className = 'empty';
                board.textContent = mode === 'run'
                    ? 'No runs yet. Be the first — head back and play!'
                    : 'No climbs yet. Be the first — head back and play!';
                return;
            }
            board.className = '';
            board.innerHTML = '';

            // Podium for top 3
            const podium = document.createElement('div');
            podium.className = 'podium';
            podium.innerHTML = podiumHtml(top, myUid);
            board.appendChild(podium);

            // Remaining rows (#4 onward)
            top.slice(3).forEach((e, i) => {
                const rank = i + 4;
                const isMe = myUid && e.uid === myUid;
                const row = document.createElement('div');
                row.className = 'row' + (isMe ? ' me' : '');
                row.innerHTML =
                    `<div class="rank">#${rank}</div>` +
                    `<div class="name">` +
                        (e.avatar ? `<span class="avatar">${e.avatar}</span>` : '<span class="avatar">🙂</span>') +
                        escapeHtml(e.displayName) +
                        (isMe ? `<span class="me-tag">You</span>` : '') +
                    `</div>` +
                    `<div class="dist">${e.value} m</div>`;
                board.appendChild(row);
            });
        } catch (e) {
            board.className = 'empty';
            board.textContent = 'Couldn\'t load scores — ' + (e && e.message ? e.message : 'try again later.');
        }
    }

    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => {
                const active = t === btn;
                t.classList.toggle('active', active);
                t.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            render(btn.dataset.mode);
        });
    });

    render('run');
})();
</script>
</body>
</html>
